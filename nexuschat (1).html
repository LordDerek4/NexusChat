<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg0:#0d0e14;
  --bg1:#13151f;
  --bg2:#181b27;
  --bg3:#1e2130;
  --bg4:#242840;
  --surface:#1a1d2e;
  --border:#272b3f;
  --border2:#2f3450;
  --txt1:#e6e8f0;
  --txt2:#8b90b0;
  --txt3:#555a78;
  --acc:#5d6af0;
  --acc2:#7c85f5;
  --acc-glow:rgba(93,106,240,.18);
  --grn:#3ddc97;
  --grn-dim:rgba(61,220,151,.12);
  --red:#f0607a;
  --yel:#f0c060;
  --out-bg:#2a2f5a;
  --out-txt:#d8dbff;
  --in-bg:#1e2130;
  --in-txt:#e6e8f0;
  --rad:14px;
  --shadow:0 8px 32px rgba(0,0,0,.5);
}
[data-theme=light]{
  --bg0:#edf0f8;
  --bg1:#f5f7ff;
  --bg2:#ffffff;
  --bg3:#eef0fb;
  --bg4:#e5e8f5;
  --surface:#ffffff;
  --border:#dde0f0;
  --border2:#cdd0e8;
  --txt1:#1a1d30;
  --txt2:#5a5f80;
  --txt3:#9098be;
  --acc:#4a57e8;
  --acc2:#6570f0;
  --acc-glow:rgba(74,87,232,.12);
  --grn:#28b87a;
  --out-bg:#4a57e8;
  --out-txt:#ffffff;
  --in-bg:#ffffff;
  --in-txt:#1a1d30;
}

html,body{height:100%;overflow:hidden;font-family:'Sora',sans-serif;font-size:14px;background:var(--bg0);color:var(--txt1)}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── AUTH ── */
#auth{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg0);z-index:9999;
}
#auth::before{
  content:'';position:absolute;
  width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(93,106,240,.07) 0%,transparent 70%);
  top:-200px;left:-200px;animation:breathe 8s ease-in-out infinite;
}
#auth::after{
  content:'';position:absolute;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(61,220,151,.05) 0%,transparent 70%);
  bottom:-150px;right:-100px;animation:breathe 8s ease-in-out infinite 4s;
}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

.auth-card{
  background:var(--bg1);border:1px solid var(--border);border-radius:24px;
  padding:48px;width:420px;position:relative;z-index:1;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.auth-logo-icon{
  width:46px;height:46px;border-radius:14px;
  background:linear-gradient(135deg,var(--acc),var(--grn));
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.auth-logo-name{font-size:22px;font-weight:700;letter-spacing:-.5px}
.auth-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.auth-sub{color:var(--txt2);margin-bottom:28px}
.auth-tabs{display:flex;background:var(--bg2);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.auth-tab{
  flex:1;padding:9px;border:none;background:transparent;color:var(--txt2);
  cursor:pointer;border-radius:8px;font-family:'Sora',sans-serif;font-size:13.5px;font-weight:500;
  transition:all .2s;
}
.auth-tab.on{background:var(--acc);color:#fff}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12.5px;font-weight:500;color:var(--txt2);margin-bottom:6px}
.fi{
  width:100%;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;color:var(--txt1);font-family:'Sora',sans-serif;font-size:14px;
  outline:none;transition:all .2s;
}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-glow)}
.fi::placeholder{color:var(--txt3)}
.auth-err{
  background:rgba(240,96,122,.1);border:1px solid rgba(240,96,122,.3);
  border-radius:8px;padding:9px 13px;color:var(--red);font-size:13px;margin-bottom:14px;
}
.auth-btn{
  width:100%;padding:13px;background:linear-gradient(135deg,var(--acc) 0%,#7b6ef5 100%);
  border:none;border-radius:10px;color:#fff;font-family:'Sora',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;
  transition:all .2s;box-shadow:0 4px 16px rgba(93,106,240,.3);
}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(93,106,240,.45)}
.auth-btn:active{transform:none}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-hint{text-align:center;color:var(--txt3);font-size:12px;margin-top:16px}
.auth-hint span{color:var(--acc);cursor:pointer}
.ph-row{display:flex;gap:8px}
.ph-code{width:86px;flex-shrink:0}

/* ── APP SHELL ── */
#app{display:flex;height:100vh;opacity:0;transition:opacity .3s}
#app.visible{opacity:1}

/* ── SIDEBAR ── */
.sidebar{
  width:300px;min-width:260px;background:var(--bg1);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:width .3s;flex-shrink:0;
}
.sb-head{
  padding:16px 14px 10px;display:flex;align-items:center;gap:10px;
}
.my-avatar{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--grn));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;overflow:hidden;position:relative;
}
.my-avatar img{width:100%;height:100%;object-fit:cover}
.my-avatar .online-ring{
  position:absolute;bottom:0;right:0;width:10px;height:10px;
  background:var(--grn);border-radius:50%;border:2px solid var(--bg1);
}
.sb-title{flex:1;font-size:17px;font-weight:700;letter-spacing:-.3px}
.ib{
  width:34px;height:34px;background:var(--bg3);border:none;border-radius:9px;
  color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .2s;flex-shrink:0;
}
.ib:hover{background:var(--bg4);color:var(--txt1)}
.ib.active{background:var(--acc);color:#fff}
.sb-search{padding:0 12px 10px;position:relative}
.sb-search input{
  width:100%;padding:9px 14px 9px 36px;background:var(--bg2);
  border:1px solid var(--border);border-radius:10px;color:var(--txt1);
  font-family:'Sora',sans-serif;font-size:13.5px;outline:none;transition:all .2s;
}
.sb-search input:focus{border-color:var(--acc)}
.sb-search input::placeholder{color:var(--txt3)}
.sb-search .si{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:14px;pointer-events:none}
.chat-list{flex:1;overflow-y:auto;padding:0 6px 8px}
.chat-item{
  display:flex;align-items:center;gap:10px;padding:10px 10px;
  border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:2px;
  position:relative;
}
.chat-item:hover{background:var(--bg3)}
.chat-item.act{background:var(--bg4)}
.chat-item.act::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:55%;background:var(--acc);border-radius:0 3px 3px 0;
}
.ci-av{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:var(--bg4);display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:16px;color:var(--acc);position:relative;overflow:hidden;
}
.ci-av img{width:100%;height:100%;object-fit:cover}
.ci-dot{
  position:absolute;bottom:1px;right:1px;width:10px;height:10px;
  background:var(--grn);border-radius:50%;border:2px solid var(--bg1);
}
.ci-info{flex:1;min-width:0}
.ci-name{
  font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:5px;
}
.ci-last{
  color:var(--txt2);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-top:2px;display:flex;align-items:center;gap:3px;
}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ci-time{color:var(--txt3);font-size:11px}
.badge{
  background:var(--acc);color:#fff;border-radius:10px;
  padding:1px 6px;font-size:10.5px;font-weight:700;min-width:18px;text-align:center;
}
.badge.muted{background:var(--txt3)}
.pin-icon{font-size:10px;color:var(--yel)}
.grp-tag{
  font-size:9.5px;background:var(--grn-dim);color:var(--grn);
  padding:1px 5px;border-radius:4px;font-weight:600;
}
.typing-anim{display:flex;gap:2px;align-items:center}
.td{
  width:4px;height:4px;border-radius:50%;background:var(--grn);
  animation:tdp 1.2s ease-in-out infinite;
}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes tdp{0%,100%{transform:scale(.5);opacity:.4}50%{transform:scale(1);opacity:1}}

.sb-empty{text-align:center;padding:40px 20px;color:var(--txt3)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg0)}
.msgs-outer{flex:1;position:relative;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.msgs-area{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:1px;background:var(--bg0);background-image:radial-gradient(ellipse at 15% 10%,rgba(93,106,240,.04) 0%,transparent 50%),radial-gradient(ellipse at 85% 90%,rgba(61,220,151,.03) 0%,transparent 50%)}
.no-chat{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;color:var(--txt3);
}
.no-chat-icon{
  width:88px;height:88px;border-radius:50%;background:var(--bg1);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:38px;box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.no-chat h2{font-size:22px;font-weight:700;color:var(--txt2)}
.no-chat p{font-size:13.5px;text-align:center;max-width:280px}

/* ── CHAT HEADER ── */
.chat-head{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;background:var(--bg1);
  flex-shrink:0;
}
.ch-av{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:var(--bg4);display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:15px;color:var(--acc);overflow:hidden;
}
.ch-av img{width:100%;height:100%;object-fit:cover}
.ch-info{flex:1;min-width:0}
.ch-name{font-weight:700;font-size:15.5px;letter-spacing:-.2px}
.ch-status{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:5px;margin-top:2px}
.ch-status .dot{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block}
.ch-status .dot.off{background:var(--txt3)}
.ch-actions{display:flex;gap:5px}

/* ── MESSAGES ── */
.msgs-area{
  flex:1;overflow-y:auto;padding:18px 16px;
  display:flex;flex-direction:column;gap:1px;
  background:var(--bg0);
  background-image:
    radial-gradient(ellipse at 15% 10%,rgba(93,106,240,.04) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 90%,rgba(61,220,151,.03) 0%,transparent 50%);
}
.date-sep{
  display:flex;align-items:center;gap:12px;margin:14px 0 8px;color:var(--txt3);font-size:11.5px;
}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

.msg-row{
  display:flex;align-items:flex-end;gap:7px;
  animation:msgpop .2s ease-out;
  margin-bottom:1px;
}
@keyframes msgpop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-row.out{flex-direction:row-reverse}
.msg-row.consec .mav{visibility:hidden}

.mav{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:var(--bg4);display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;color:var(--acc);overflow:hidden;
}
.mav img{width:100%;height:100%;object-fit:cover}

.msg-wrap{max-width:62%;position:relative}

.bubble{
  padding:9px 13px;border-radius:18px;word-break:break-word;
  position:relative;cursor:default;transition:filter .15s;
}
.bubble:hover{filter:brightness(1.05)}
.msg-row.out .bubble{
  background:var(--out-bg);color:var(--out-txt);
  border-bottom-right-radius:4px;
}
.msg-row:not(.out) .bubble{
  background:var(--in-bg);color:var(--in-txt);
  border-bottom-left-radius:4px;
  border:1px solid var(--border);
}
.msg-row.consec.out .bubble{border-bottom-right-radius:18px}
.msg-row.consec:not(.out) .bubble{border-bottom-left-radius:18px}

.msg-sender{font-size:11px;font-weight:600;color:var(--grn);margin-bottom:4px}
.msg-txt{font-size:14px;line-height:1.55}
.msg-foot{
  display:flex;align-items:center;gap:4px;justify-content:flex-end;
  margin-top:4px;
}
.msg-time{font-size:10.5px;color:var(--txt3);opacity:.8}
.msg-row.out .msg-time{color:rgba(200,205,255,.55)}
.ticks{font-size:12px;color:var(--txt3);line-height:1}
.ticks.read{color:var(--grn)}
.edited-lbl{font-size:10px;color:var(--txt3);font-style:italic}

/* reply preview in bubble */
.rp-box{
  background:rgba(0,0,0,.15);border-radius:9px;padding:6px 9px;
  margin-bottom:7px;border-left:3px solid var(--grn);
}
.rp-sender{font-size:11px;font-weight:600;color:var(--grn);margin-bottom:2px}
.rp-txt{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* reactions */
.reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.rpill{
  background:var(--bg3);border:1px solid var(--border);border-radius:20px;
  padding:2px 7px;font-size:12.5px;cursor:pointer;
  display:flex;align-items:center;gap:2px;transition:all .15s;
}
.rpill:hover{border-color:var(--acc);background:var(--bg4)}
.rpill.mine{border-color:var(--acc);background:var(--acc-glow)}
.rpill .rc{font-size:10.5px;color:var(--txt2)}

/* media messages */
.msg-img{
  max-width:260px;max-height:300px;border-radius:12px;
  display:block;cursor:pointer;object-fit:cover;
  transition:opacity .15s;
}
.msg-img:hover{opacity:.9}
.msg-doc{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.1);border-radius:10px;padding:10px;
}
.doc-icon{font-size:28px;flex-shrink:0}
.doc-info{min-width:0}
.doc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.doc-size{font-size:11px;color:var(--txt2);margin-top:2px}
.audio-msg{display:flex;align-items:center;gap:10px;min-width:200px}
.play-btn{
  width:34px;height:34px;border-radius:50%;background:var(--acc);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:#fff;flex-shrink:0;font-size:12px;transition:all .15s;
}
.play-btn:hover{background:var(--acc2);transform:scale(1.05)}
.waveform{flex:1;display:flex;align-items:center;gap:2px;height:30px;cursor:pointer}
.wb{
  flex:1;background:currentColor;border-radius:2px;opacity:.5;
  transition:opacity .15s;
  animation:ww 1.5s ease-in-out infinite;
}
.waveform:hover .wb{opacity:.8}
@keyframes ww{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
.audio-dur{font-size:11px;color:var(--txt2);font-family:'JetBrains Mono',monospace}

.deleted-msg{
  font-style:italic;color:var(--txt3);font-size:13px;
  display:flex;align-items:center;gap:6px;
}

/* ── SCROLL TO BOTTOM ── */
.scroll-to-bottom{
  position:absolute;bottom:12px;right:18px;z-index:30;
  width:36px;height:36px;border-radius:50%;
  background:var(--acc);border:2px solid var(--bg0);
  color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(93,106,240,.5);
  opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;
}
.scroll-to-bottom.show{opacity:1;pointer-events:all}
.scroll-to-bottom:hover{transform:scale(1.1)}
.scroll-to-bottom .stb-badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--grn);color:#fff;border-radius:10px;
  font-size:9px;font-weight:700;padding:1px 4px;
  border:2px solid var(--bg0);min-width:16px;text-align:center;
  display:none;
}
.msgs-outer{flex:1;position:relative;display:flex;flex-direction:column;min-height:0}

/* hover quick reactions */
.qr-bar{
  position:absolute;
  background:var(--bg1);border:1px solid var(--border2);
  border-radius:28px;padding:5px 8px;display:flex;gap:2px;
  box-shadow:0 6px 24px rgba(0,0,0,.6);z-index:200;
  animation:menuIn .12s ease-out;white-space:nowrap;
  bottom:calc(100% + 8px);
}
.qr-bar.out{right:0}
.qr-bar.in{left:0}
.qr-btn{
  border:none;background:transparent;font-size:20px;cursor:pointer;
  padding:3px 5px;border-radius:50%;transition:all .15s;line-height:1;
}
.qr-btn:hover{transform:scale(1.35);background:var(--bg3)}

/* ── INPUT AREA ── */
.input-wrap{
  padding:10px 14px;background:var(--bg1);border-top:1px solid var(--border);
  flex-shrink:0;position:relative;
}
.reply-bar{
  display:flex;align-items:center;gap:10px;background:var(--bg2);
  border-radius:9px;padding:7px 11px;margin-bottom:9px;
  border-left:3px solid var(--acc);
}
.rb-content{flex:1;min-width:0}
.rb-sender{font-size:11.5px;font-weight:600;color:var(--acc);margin-bottom:1px}
.rb-txt{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-close{color:var(--txt3);cursor:pointer;padding:3px;font-size:16px;transition:color .15s}
.rb-close:hover{color:var(--red)}

.input-row{display:flex;align-items:flex-end;gap:7px}
.input-actions{display:flex;gap:3px;flex-shrink:0;align-items:flex-end}
.msg-input{
  flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:13px;
  padding:10px 14px;color:var(--txt1);font-family:'Sora',sans-serif;font-size:14px;
  resize:none;outline:none;min-height:44px;max-height:150px;
  transition:border-color .2s;line-height:1.5;overflow-y:auto;
}
.msg-input:focus{border-color:var(--acc)}
.msg-input::placeholder{color:var(--txt3)}
.send-btn{
  width:44px;height:44px;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),#7b6ef5);
  border:none;border-radius:13px;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:17px;
  transition:all .2s;box-shadow:0 3px 12px rgba(93,106,240,.4);
}
.send-btn:hover{transform:scale(1.06);box-shadow:0 6px 18px rgba(93,106,240,.5)}
.send-btn:active{transform:scale(.97)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.rec-ind{
  flex:1;background:var(--bg2);border:1px solid rgba(240,96,122,.4);border-radius:13px;
  padding:10px 14px;display:flex;align-items:center;gap:10px;min-height:44px;
}
.rec-dot{
  width:8px;height:8px;border-radius:50%;background:var(--red);
  animation:recblink 1s ease-in-out infinite;flex-shrink:0;
}
@keyframes recblink{0%,100%{opacity:1}50%{opacity:.2}}
.rec-txt{color:var(--red);font-size:13.5px;flex:1}
.rec-cancel{color:var(--txt3);cursor:pointer;font-size:13px;transition:color .15s}
.rec-cancel:hover{color:var(--red)}

/* ── EMOJI PICKER ── */
.emoji-picker{
  position:absolute;bottom:70px;left:14px;
  background:var(--bg1);border:1px solid var(--border);border-radius:16px;
  padding:12px;width:292px;box-shadow:var(--shadow);z-index:100;
  animation:menuIn .15s ease-out;

    const d={me:STATE.me,users:STATE.users,rooms:STATE.rooms,messages:STATE.messages,settings:STATE.settings};

// Longest-match phone code lookup
function getPhoneRegion(phone){
  const digits = phone.replace(/\D/g,'');
  // try 3-digit, 2-digit, 1-digit prefix
  for(const len of [3,2,1]){
    const prefix = digits.slice(0,len);
    const match = PHONE_REGIONS.find(r=>r.code===prefix);
    if(match) return match;
  }
  return {code:'?',flag:'🌐',region:'Unknown region'};
}

function maskPhone(phone){
  const digits = phone.replace(/\D/g,'');
  if(digits.length<=4) return phone;
  return phone.slice(0,phone.indexOf(digits.slice(-4))) + '••••' + digits.slice(-4);
}

let authIsRegister = false;

// Read all registered accounts from localStorage and render them
function renderRegisteredAccounts(){
  const wrap = document.getElementById('reg-accounts-wrap');
  const list = document.getElementById('reg-accounts-list');
  if(!wrap||!list) return;

  const accounts = [];
  try{
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!k||!k.startsWith('nx_')) continue;
      const raw = localStorage.getItem(k);
      if(!raw) continue;
      const d = JSON.parse(raw);
      if(d?.me?.phone) accounts.push(d.me);
    }
  }catch(e){}

  if(!accounts.length){
    wrap.style.display='none';
    return;
  }

  wrap.style.display='block';
  list.innerHTML = accounts.map(u=>{
    const reg = getPhoneRegion(u.phone);
    const masked = maskPhone(u.phone);
    return `<div class="reg-item" onclick="quickFillAccount('${escAuthStr(u.phone)}','${escAuthStr(u.username)}')">
      <div class="reg-flag">${reg.flag}</div>
      <div class="reg-info">
        <div class="reg-name">${escHtmlAuth(u.username)}</div>
        <div class="reg-region">${reg.region}</div>
        <div class="reg-phone">${escHtmlAuth(masked)}</div>
      </div>
      <div class="reg-arrow">→</div>
    </div>`;
  }).join('');
}

function escHtmlAuth(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAuthStr(s){
  return String(s||'').replace(/'/g,"\\'");
}

function quickFillAccount(phone, username){
  // Strip leading + or digits prefix, fill code and number
  const digits = phone.replace(/\D/g,'');
  const reg = getPhoneRegion(phone);
  const codeDigits = reg.code;
  const numberPart = digits.slice(codeDigits.length);

  const codeEl = document.getElementById('inp-code');
  const phoneEl = document.getElementById('inp-phone');
  const passEl = document.getElementById('inp-pass');

  if(codeEl) codeEl.value = '+' + codeDigits;
  if(phoneEl){ phoneEl.value = numberPart; phoneEl.focus(); }
  if(passEl) passEl.focus();

  // Make sure we're on login tab
  if(authIsRegister) switchAuthTab('login');
}


function switchAuthTab(tab){
  authIsRegister = tab === 'register';
  document.querySelectorAll('.auth-tab').forEach((b,i)=>{
    b.classList.toggle('on', (i===0 && !authIsRegister)||(i===1 && authIsRegister));
  });
  document.getElementById('auth-submit').textContent = authIsRegister ? 'Create Account' : 'Sign In';
  document.getElementById('auth-title').textContent = authIsRegister ? 'Create account' : 'Welcome back';
  document.getElementById('auth-sub').textContent = authIsRegister ? 'Register with your phone number' : 'Sign in with your phone number';
  // toggle name + phone fields
  const extra = document.getElementById('auth-extra-fields');
  if(authIsRegister){
    extra.innerHTML='<div class="fg"><label class="fl">Display Name</label><input class="fi" id="inp-username" placeholder="Your name" autocomplete="name"></div>';
    // Hide accounts list on register tab
    const w=document.getElementById('reg-accounts-wrap');
    if(w)w.style.display='none';
  } else {
    extra.innerHTML='';
    renderRegisteredAccounts();
  }
  document.getElementById('auth-err').style.display='none';
}

function showAuthErr(msg){
  const el = document.getElementById('auth-err');
  el.textContent = msg;
  el.style.display = 'block';
}

function handleAuth(){
  const code  = (document.getElementById('inp-code')?.value||'').trim();
  const raw   = (document.getElementById('inp-phone')?.value||'').replace(/\D/g,'');
  const pass  = (document.getElementById('inp-pass')?.value||'');
  if(!raw || raw.length < 6){ return showAuthErr('Please enter a valid phone number'); }
  if(!pass || pass.length < 4){ return showAuthErr('Password must be at least 4 characters'); }
  const phone = (code+raw).replace(/[^+\d]/g,'');

  if(authIsRegister){
    const uname = (document.getElementById('inp-username')?.value||'').trim();
    if(!uname){ return showAuthErr('Display name is required'); }
    const existing = _loadState(phone);
    if(existing && existing.me){ return showAuthErr('Account already exists for this number. Please sign in.'); }
    const user = {id:'me',username:uname,phone,email:null,status:'Hey there! I am using NexusChat.',avatar:null,createdAt:new Date().toISOString()};
    doLogin(user, true);
  } else {
    const saved = _loadState(phone);
    if(!saved || !saved.me){ return showAuthErr('No account found. Please sign up first.'); }
    doLogin(saved.me, false, saved);
  }
}

function doLogin(user, isNew, saved){
  if(isNew===undefined)isNew=true;
  STATE.me=user; STATE.users={}; STATE.rooms={}; STATE.messages={};
  STATE.activeRoom=null; STATE.showProfile=false;
  STATE.settings={notifications:true,readReceipts:true,sounds:true};
  if(!isNew && saved){
    STATE.users=saved.users||{};
    STATE.rooms=saved.rooms||{};
    STATE.messages=saved.messages||{};
    STATE.settings=saved.settings||STATE.settings;
  } else {
    STATE.users["me"]=user;
    _saveState();
  }
  const ts=new Date().toLocaleString([],{dateStyle:"medium",timeStyle:"medium"});
  console.log("[NexusChat] "+(isNew?"Registered":"Login")+": "+user.username+" | "+user.phone+" | "+ts);
  document.getElementById('auth').style.opacity='0';
  document.getElementById('auth').style.pointerEvents='none';
  setTimeout(()=>{document.getElementById('auth').style.display='none';},300);
  document.getElementById('app').classList.add('visible');
  document.documentElement.setAttribute('data-theme',STATE.theme);
  document.getElementById('theme-btn').textContent=STATE.theme==='dark'?'🌙':'☀️';
  renderSidebar();
  renderMyAvatar();
  startSimulator();
  toast('👋','Welcome, '+user.username+'!',isNew?'Account created — '+ts:'Signed in — '+ts);
}
function renderMyAvatar(){
  const el = document.getElementById('my-avatar');
  el.innerHTML = '';
  if(STATE.me.avatar){
    el.innerHTML = `<img src="${STATE.me.avatar}" alt="me"><div class="online-ring"></div>`;
  } else {
    el.innerHTML = `${initials(STATE.me.username)}<div class="online-ring"></div>`;

    el.style.color = '#fff';

}

// HELPERS

function initials(name){
  return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function fmtTime(d){
  if(!d)return'';
  return new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(d){
  if(!d)return'';
  const nd = new Date(d), now = new Date();
  if(now.toDateString()===nd.toDateString())return'Today';
  const prev = new Date(now); prev.setDate(prev.getDate()-1);
  if(prev.toDateString()===nd.toDateString())return'Yesterday';
  const diff = (now-nd)/86400000;
  if(diff<7)return nd.toLocaleDateString([],{weekday:'long'});
  return nd.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
}
function fmtSideTime(d){
  if(!d)return'';
  const nd = new Date(d), now = new Date();
  if(now.toDateString()===nd.toDateString())return fmtTime(nd);
  const diff = (now-nd)/86400000;
  if(diff<7)return nd.toLocaleDateString([],{weekday:'short'});
  return nd.toLocaleDateString([],{month:'short',day:'numeric'});
}
function fmtSize(b){
  if(!b)return'';
  if(b<1024)return`${b}B`;
  if(b<1048576)return`${(b/1024).toFixed(1)}KB`;
  return`${(b/1048576).toFixed(1)}MB`;
}
function fmtDuration(s){
  if(!s)return'0:00';
  return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function escHtml(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getRoom(id){return STATE.rooms[id]}
function getUser(id){if(id==='me')return STATE.me;return STATE.users[id]||{id,username:'Unknown',avatar:null,isOnline:false}}
function getRoomDisplayName(room){
  if(room.type==='group')return room.name;
  const other = room.members.find(m=>m.id!=='me');
  return getUser(other?.id)?.username||'Unknown';
}
function getRoomOtherUser(room){
  if(room.type!=='direct')return null;
  const other = room.members.find(m=>m.id!=='me');
  return getUser(other?.id);
}
function avatarEl(user, size=44){
  if(user.avatar){
    return `<img src="${escHtml(user.avatar)}" alt="${escHtml(user.username)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  }
  const colors = ['linear-gradient(135deg,#5d6af0,#7c85f5)','linear-gradient(135deg,#3ddc97,#28b87a)','linear-gradient(135deg,#f0607a,#f0a04b)','linear-gradient(135deg,#9b59f5,#5d6af0)','linear-gradient(135deg,#f0a04b,#f0607a)'];
  const hash = user.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const color = colors[hash%colors.length];
  return `<div style="width:100%;height:100%;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:${Math.floor(size*0.35)}px">${initials(user.username)}</div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// SIDEBAR RENDER
// ══════════════════════════════════════════════════════════════════════════════
function renderSidebar(){
  const q = STATE.searchQuery.toLowerCase();
  let rooms = Object.values(STATE.rooms).filter(r=>{
    if(r.archived && !STATE.showArchived)return false;
    if(!q)return true;
    return getRoomDisplayName(r).toLowerCase().includes(q);
  });
  // Sort: pinned first, then by lastMessage timestamp
  rooms.sort((a,b)=>{
    if(a.pinned && !b.pinned)return-1;
    if(!a.pinned && b.pinned)return 1;
    return new Date(b.lastMessage?.timestamp||0)-new Date(a.lastMessage?.timestamp||0);
  });

  const cl = document.getElementById('chat-list');
  if(rooms.length===0){
    cl.innerHTML='<div class="sb-empty">No chats found</div>';return;
  }
  cl.innerHTML = rooms.map(r=>renderChatItem(r)).join('');
}

function renderChatItem(room){
  const name = escHtml(getRoomDisplayName(room));
  const isActive = STATE.activeRoom?.id === room.id;
  const other = getRoomOtherUser(room);
  const av = other ? avatarEl(other,44) : avatarEl({id:room.id,username:room.name,avatar:null},44);

  let lastTxt = '';
  const lm = room.lastMessage;
  if(lm){
    const sender = lm.senderId==='me'?'You':getUser(lm.senderId).username.split(' ')[0];
    const pfx = room.type==='group'?`${sender}: `:'';
    if(lm.type==='audio')lastTxt=pfx+'🎙️ Voice message';
    else if(lm.type==='image')lastTxt=pfx+'📷 Photo';
    else if(lm.type==='video')lastTxt=pfx+'🎥 Video';
    else if(lm.type==='document')lastTxt=pfx+'📄 Document';
    else lastTxt=pfx+escHtml(lm.content||'');
  } else {lastTxt='<em>No messages yet</em>';}

  const isTyping = room.typingUsers && room.typingUsers.length>0;
  const onlineDot = other && other.isOnline && room.type==='direct' ? `<div class="ci-dot"></div>` : '';

  return `<div class="chat-item${isActive?' act':''}" onclick="selectRoom('${room.id}')">
    <div class="ci-av">${av}${onlineDot}</div>
    <div class="ci-info">
      <div class="ci-name">
        ${room.pinned?'<span class="pin-icon">📌</span>':''}
        ${room.type==='group'?'<span class="grp-tag">GROUP</span>':''}
        ${name}
      </div>
      <div class="ci-last">
        ${isTyping
          ? `<span style="color:var(--grn);font-style:italic">typing...</span>`
          : lastTxt
        }
      </div>
    </div>
    <div class="ci-meta">
      <span class="ci-time">${lm?fmtSideTime(lm.timestamp):''}</span>
      ${room.unread>0?`<div class="badge${room.muted?' muted':''}">${room.unread>99?'99+':room.unread}</div>`:''}
    </div>
  </div>`;
}

function filterChats(q){
  STATE.searchQuery = q;
  renderSidebar();
}

// ROOM SELECTION

function selectRoom(id){
  const room = STATE.rooms[id];
  if(!room)return;
  STATE.activeRoom = room;
  room.unread = 0;
  STATE.replyTo = null;
  STATE.chatSearchMode = false;
  STATE.chatSearch = '';
  renderSidebar();
  renderChatArea();
  // Mark all as read
  (STATE.messages[id]||[]).forEach(m=>{
    if(m.senderId!=='me' && !m.readBy.includes('me')) m.readBy.push('me');
  });
  // On mobile hide sidebar
  if(window.innerWidth<=700){
    document.getElementById('sidebar').classList.add('mob-hidden');
  }
}

function renderChatArea(){
  const main = document.getElementById('main');
  const room = STATE.activeRoom;
  if(!room){
    main.innerHTML=`<div class="no-chat" id="no-chat"><div class="no-chat-icon">💬</div><h2>NexusChat</h2><p>Select a conversation or start a new one</p></div>`;
    return;
  }

  const other = getRoomOtherUser(room);
  const name = escHtml(getRoomDisplayName(room));
  const av = other ? avatarEl(other,40) : avatarEl({id:room.id,username:room.name,avatar:null},40);
  const statusTxt = room.type==='group'
    ? `${room.members.length} members`
    : other?.isOnline
      ? `<span class="dot"></span><span style="color:var(--grn)">Online</span>`
      : `<span class="dot off"></span>Last seen ${fmtTime(other?.lastSeen)||'a while ago'}`;

  main.innerHTML = `
    ${STATE.chatSearchMode ? renderSearchBar() : ''}
    <div class="chat-head" id="chat-head">
      <div class="ch-av" onclick="toggleProfile()" style="cursor:pointer">${av}</div>
      <div class="ch-info" onclick="toggleProfile()" style="cursor:pointer">
        <div class="ch-name">${name}</div>
        <div class="ch-status" id="ch-status">${statusTxt}</div>
      </div>
      <div class="ch-actions">
        <button class="ib" onclick="toggleChatSearch()" title="Search messages">🔍</button>
        <button class="ib" onclick="simulateCall('voice')" title="Voice call">📞</button>
        <button class="ib" onclick="simulateCall('video')" title="Video call">📹</button>
        <button class="ib" onclick="toggleProfile()" title="Info" id="info-btn">ℹ️</button>
        ${window.innerWidth<=700?`<button class="ib" onclick="backToSidebar()">←</button>`:''}
      </div>
    </div>
    <div class="msgs-outer">
      <div class="msgs-area" id="msgs-area"></div>
      <button class="scroll-to-bottom" id="scroll-to-bottom" onclick="scrollToLatest()">
        ↓<div class="stb-badge" id="stb-badge"></div>
      </button>
    </div>
    <div class="input-wrap" id="input-wrap">
      ${renderInputArea()}
    </div>
  `;

  renderMessages();
  scrollBottom(false);
  _initScrollWatcher();
  document.getElementById('msg-input')?.focus();
  if(STATE.showProfile) renderProfilePanel();
}

function renderSearchBar(){
  return `<div class="search-in-chat" id="search-in-chat">
    <span>🔍</span>
    <input class="sic-input" id="sic-inp" placeholder="Search in conversation..." value="${escHtml(STATE.chatSearch)}" oninput="chatSearchUpdate(this.value)">
    <button class="ib" onclick="toggleChatSearch()">✕</button>
  </div>`;
}

function renderInputArea(){
  if(STATE.recording){
    return `<div class="input-row">
      <div class="rec-ind">
        <div class="rec-dot"></div>
        <span class="rec-txt">Recording voice message... ${STATE.recordingTime}s</span>
        <span class="rec-cancel" onclick="cancelRecording()">Cancel</span>
      </div>
      <button class="send-btn" onmouseup="stopRecording()" title="Stop and send">⏹️</button>
    </div>`;
  }
  return `
    ${STATE.replyTo ? renderReplyBar() : ''}
    <div class="input-row">
      <div class="input-actions">
        <button class="ib${STATE.showEmojiPicker?' active':''}" onclick="toggleEmoji()" title="Emoji">😊</button>
        <button class="ib" onclick="triggerFileUpload()" title="Attach">📎</button>
        <input type="file" id="file-input" style="display:none" accept="image/*,video/*,audio/*,.pdf,.doc,.docx" onchange="handleFileUpload(event)">
      </div>
      <textarea class="msg-input" id="msg-input" placeholder="Type a message..." rows="1"
        onkeydown="handleInputKey(event)" oninput="handleInputChange(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
    ${STATE.showEmojiPicker ? renderEmojiPicker() : ''}
  `;
}

function renderReplyBar(){
  const m = STATE.replyTo;
  const senderName = m.senderId==='me'?'You':getUser(m.senderId).username;
  const preview = m.type!=='text'?`📎 ${m.type}`:escHtml((m.content||'').slice(0,80));
  return `<div class="reply-bar">
    <div class="rb-content">
      <div class="rb-sender">${escHtml(senderName)}</div>
      <div class="rb-txt">${preview}</div>
    </div>
    <span class="rb-close" onclick="clearReply()">✕</span>
  </div>`;
}

function renderEmojiPicker(){
  return `<div class="emoji-picker" id="emoji-picker">
    <input class="ep-search" id="ep-search" placeholder="Search emoji..." oninput="filterEmoji(this.value)">
    <div class="ep-grid" id="ep-grid">
      ${EMOJI_ALL.map(e=>`<button class="ep-btn" onclick="insertEmoji('${e}')">${e}</button>`).join('')}
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// MESSAGE RENDERING
// ══════════════════════════════════════════════════════════════════════════════
function renderMessages(){
  const area = document.getElementById('msgs-area');
  if(!area||!STATE.activeRoom)return;
  const msgs = (STATE.messages[STATE.activeRoom.id]||[]).filter(m=>{
    if(!STATE.chatSearch)return true;
    return m.content && m.content.toLowerCase().includes(STATE.chatSearch.toLowerCase());
  });

  if(msgs.length===0){
    area.innerHTML=STATE.chatSearch
      ? '<div style="text-align:center;color:var(--txt3);padding:40px">No messages found</div>'
      : '<div style="text-align:center;color:var(--txt3);padding:60px 20px">No messages yet. Say hello! 👋</div>';
    return;
  }

  let html = '', lastDate = '', lastSender = '';
  msgs.forEach((msg,i)=>{
    const d = fmtDate(msg.createdAt);
    if(d!==lastDate){
      html+=`<div class="date-sep">${d}</div>`;
      lastDate=d; lastSender='';
    }
    const isOut = msg.senderId==='me';
    const sender = getUser(msg.senderId);
    const consecutive = lastSender===msg.senderId && i>0;
    lastSender = msg.senderId;
    html += renderMsgRow(msg,isOut,consecutive,sender);
  });
  area.innerHTML = html;
}

function renderMsgRow(msg, isOut, consecutive, sender){
  if(msg.isDeleted){
    return `<div class="msg-row${isOut?' out':''}${consecutive?' consec':''}">
      <div class="mav">${consecutive?'':avatarEl(sender,26)}</div>
      <div class="msg-wrap">
        <div class="bubble">
          <div class="deleted-msg">🚫 This message was deleted</div>
          <div class="msg-foot"><span class="msg-time">${fmtTime(msg.createdAt)}</span></div>
        </div>
      </div>
    </div>`;
  }

  const replyHtml = msg.replyTo ? renderReplyPreview(msg.replyTo) : '';
  const senderLabel = !isOut && !consecutive && STATE.activeRoom?.type==='group'
    ? `<div class="msg-sender">${escHtml(sender.username)}</div>` : '';
  const contentHtml = renderMsgContent(msg, isOut);
  const reactHtml = msg.reactions?.length ? renderReactions(msg) : '';
  const ticks = isOut ? renderTicks(msg) : '';
  const editedLbl = msg.isEdited ? '<span class="edited-lbl">edited</span>' : '';

  // highlight search
  let hlContent = contentHtml;
  if(STATE.chatSearch && msg.content){
    const esc = STATE.chatSearch.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    hlContent = hlContent.replace(new RegExp(esc,'gi'),m=>`<span class="highlight">${m}</span>`);
  }

  return `<div class="msg-row${isOut?' out':''}${consecutive?' consec':''}" id="msg-${msg.id}"
    oncontextmenu="showCtxMenu(event,'${msg.id}')" onmouseenter="showQuickReact('${msg.id}',${isOut})" onmouseleave="hideQuickReact()">
    <div class="mav">${consecutive?'':avatarEl(sender,26)}</div>
    <div class="msg-wrap" id="wrap-${msg.id}">
      <div class="bubble" id="bubble-${msg.id}">
        ${senderLabel}${replyHtml}${hlContent}
        <div class="msg-foot">${editedLbl}<span class="msg-time">${fmtTime(msg.createdAt)}</span>${ticks}</div>
      </div>
      ${reactHtml}
    </div>
  </div>`;
}

function renderReplyPreview(replyTo){
  const sender = getUser(replyTo.senderId);
  const txt = replyTo.type!=='text'?`📎 ${replyTo.type}`:escHtml((replyTo.content||'').slice(0,80));
  return `<div class="rp-box"><div class="rp-sender">${escHtml(sender.username)}</div><div class="rp-txt">${txt}</div></div>`;
}

function renderMsgContent(msg, isOut){
  switch(msg.type){
    case 'image':
      return `<img class="msg-img" src="${escHtml(msg.media?.url||'')}" alt="Image" onclick="openLightbox('${escHtml(msg.media?.url||'')}')">`;
    case 'audio':
      return `<div class="audio-msg">
        <button class="play-btn" onclick="playAudio('${msg.id}',this)" id="pb-${msg.id}">▶</button>
        <div class="waveform" id="wf-${msg.id}">
          ${Array.from({length:24},(_,i)=>`<div class="wb" style="height:${20+Math.random()*60}%;animation-delay:${i*0.06}s"></div>`).join('')}
        </div>
        <span class="audio-dur" id="dur-${msg.id}">${fmtDuration(msg.media?.duration)}</span>
        <audio id="aud-${msg.id}" style="display:none" src="${msg.media?.blobUrl||''}" onended="audioEnded('${msg.id}')"></audio>
      </div>`;
    case 'video':
      return `<video controls style="max-width:260px;border-radius:12px;display:block" src="${escHtml(msg.media?.url||'')}"></video>`;
    case 'document':
      return `<div class="msg-doc">
        <div class="doc-icon">${getDocIcon(msg.media?.mimeType)}</div>
        <div class="doc-info">
          <div class="doc-name">${escHtml(msg.media?.name||'Document')}</div>
          <div class="doc-size">${fmtSize(msg.media?.size)}</div>
        </div>
      </div>`;
    default:
      return `<div class="msg-txt">${escHtml(msg.content||'')}</div>`;
  }
}

function getDocIcon(mime){
  if(!mime)return'📄';
  if(mime.includes('pdf'))return'📕';
  if(mime.includes('word')||mime.includes('document'))return'📘';
  if(mime.includes('sheet')||mime.includes('excel'))return'📗';
  if(mime.includes('presentation'))return'📙';
  return'📄';
}

function renderReactions(msg){
  return `<div class="reactions" id="react-${msg.id}">
    ${msg.reactions.map(r=>`
      <div class="rpill${r.userIds.includes('me')?' mine':''}" onclick="toggleReaction('${msg.id}','${r.emoji}')">
        ${r.emoji}<span class="rc">${r.userIds.length}</span>
      </div>`).join('')}
  </div>`;
}

function renderTicks(msg){
  const isRead = msg.readBy && msg.readBy.length > 0 && msg.readBy.some(id=>id!=='me');
  const isDelivered = msg.deliveredTo && msg.deliveredTo.length > 0;
  const cls = isRead?'ticks read':'ticks';
  const icon = isRead?'✓✓':isDelivered?'✓✓':'✓';
  return `<span class="${cls}" title="${isRead?'Read':isDelivered?'Delivered':'Sent'}">${icon}</span>`;
}

function scrollBottom(smooth=false){
  const area = document.getElementById('msgs-area');
  if(!area)return;
  area.scrollTo({top:area.scrollHeight, behavior:smooth?'smooth':'instant'});
  STATE.atBottom=true; STATE.newUnread=0;
  const btn=document.getElementById('scroll-to-bottom');
  if(btn)btn.classList.remove('show');
  const badge=document.getElementById('stb-badge');
  if(badge)badge.style.display='none';
}
function scrollToLatest(){
  scrollBottom(true);
}
function _initScrollWatcher(){
  const area=document.getElementById('msgs-area');
  if(!area)return;
  area.addEventListener('scroll',()=>{
    const dist=area.scrollHeight-area.scrollTop-area.clientHeight;
    STATE.atBottom=dist<80;
    const btn=document.getElementById('scroll-to-bottom');
    if(btn)btn.classList.toggle('show',!STATE.atBottom);
    if(STATE.atBottom){
      STATE.newUnread=0;
      const badge=document.getElementById('stb-badge');
      if(badge)badge.style.display='none';
    }
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// MESSAGE ACTIONS
// ══════════════════════════════════════════════════════════════════════════════
function handleInputKey(e){
  if(e.key==='Enter' && !e.shiftKey){e.preventDefault();sendMessage()}
}
function handleInputChange(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,150)+'px';
}

function sendMessage(){
  const inp = document.getElementById('msg-input');
  const text = inp?.value.trim();
  if(!text || !STATE.activeRoom)return;

  const msg = {
    id: uid(),
    roomId: STATE.activeRoom.id,
    senderId: 'me',
    type: 'text',
    content: text,
    createdAt: new Date(),
    readBy: [],
    deliveredTo: [],
    reactions: [],
    replyTo: STATE.replyTo ? {...STATE.replyTo} : null,
    isDeleted: false,
    isEdited: false,
    editHistory: []
  };
  addMessage(msg);
  if(inp){inp.value='';inp.style.height='auto';}
  clearReply();
  if(STATE.showEmojiPicker){STATE.showEmojiPicker=false;rerenderInput();}

  // simulate delivery + reply
  setTimeout(()=>{
    msg.deliveredTo = ['u1'];
    updateMessageEl(msg);
  }, 600);

  const other = getRoomOtherUser(STATE.activeRoom);
  if(other && other.isOnline && Math.random()>0.3){
    simulateTyping(STATE.activeRoom.id);
    const delay = 2000 + Math.random()*2000;
    setTimeout(()=>simulateReply(STATE.activeRoom, text), delay);
  }
}

function addMessage(msg){
  if(!STATE.messages[msg.roomId]) STATE.messages[msg.roomId]=[];
  STATE.messages[msg.roomId].push(msg);
  _saveState();
  STATE.rooms[msg.roomId].lastMessage = {
    content: msg.type==='text'?msg.content:`📎 ${msg.type}`,
    timestamp: msg.createdAt,
    type: msg.type,
    senderId: msg.senderId
  };
  renderSidebar();
  if(STATE.activeRoom?.id===msg.roomId){
    appendMessageEl(msg);
    if(STATE.atBottom){
      scrollBottom(false);
    } else if(msg.senderId!=='me'){
      STATE.newUnread++;
      const btn=document.getElementById('scroll-to-bottom');
      if(btn)btn.classList.add('show');
      const badge=document.getElementById('stb-badge');
      if(badge){badge.style.display='block';badge.textContent=STATE.newUnread>9?'9+':STATE.newUnread;}
    }
  } else if(msg.senderId!=='me'){
    STATE.rooms[msg.roomId].unread = (STATE.rooms[msg.roomId].unread||0)+1;
    renderSidebar();
    const sender = getUser(msg.senderId);
    const roomName = getRoomDisplayName(STATE.rooms[msg.roomId]);
    if(STATE.settings.notifications){
      toast('💬',`${sender.username} in ${roomName}`, msg.type==='text'?msg.content:`📎 ${msg.type}`);
    }
  }
}

function appendMessageEl(msg){
  const area = document.getElementById('msgs-area');
  if(!area)return;
  // Remove empty state
  const empty = area.querySelector('div[style*="No messages"]');
  if(empty)empty.remove();

  const msgs = STATE.messages[STATE.activeRoom.id];
  const i = msgs.indexOf(msg);
  const prev = msgs[i-1];
  const consecutive = prev && prev.senderId===msg.senderId;
  const sender = getUser(msg.senderId);
  const isOut = msg.senderId==='me';

  // Date divider?
  if(!prev || fmtDate(msg.createdAt)!==fmtDate(prev.createdAt)){
    const sep = document.createElement('div');
    sep.className='date-sep';
    sep.textContent=fmtDate(msg.createdAt);
    area.appendChild(sep);
  }

  const div = document.createElement('div');
  div.innerHTML = renderMsgRow(msg, isOut, consecutive, sender);
  area.appendChild(div.firstElementChild);
}

function updateMessageEl(msg){
  if(STATE.activeRoom?.id!==msg.roomId)return;
  const el = document.getElementById(`bubble-${msg.id}`);
  if(!el)return;
  const foot = el.querySelector('.msg-foot');
  if(!foot)return;
  const ticks = renderTicks(msg);
  const editedLbl = msg.isEdited?'<span class="edited-lbl">edited</span>':'';
  foot.innerHTML = `${editedLbl}<span class="msg-time">${fmtTime(msg.createdAt)}</span>${ticks}`;
}

function rerenderInput(){
  const wrap = document.getElementById('input-wrap');
  if(wrap) wrap.innerHTML = renderInputArea();
  document.getElementById('msg-input')?.focus();
}

// ── REPLY ──
function replyToMessage(msgId){
  const msgs = STATE.messages[STATE.activeRoom?.id]||[];
  const msg = msgs.find(m=>m.id===msgId);
  if(!msg)return;
  STATE.replyTo = msg;
  rerenderInput();
  document.getElementById('msg-input')?.focus();
}
function clearReply(){
  STATE.replyTo = null;
  rerenderInput();
}

// ── EDIT ──
function editMessage(msgId){
  const msgs = STATE.messages[STATE.activeRoom?.id]||[];
  const msg = msgs.find(m=>m.id===msgId);
  if(!msg||msg.senderId!=='me')return;

  const newContent = prompt('Edit message:', msg.content);
  if(newContent===null || newContent===msg.content)return;
  msg.editHistory.push({content:msg.content,at:new Date()});
  msg.content = newContent;
  msg.isEdited = true;

  // Re-render the specific bubble
  const bubble = document.getElementById(`bubble-${msg.id}`);
  if(bubble){
    const isOut = msg.senderId==='me';
    const consecutive = false;
    const sender = getUser(msg.senderId);
    const parent = bubble.parentElement;
    parent.innerHTML = `
      <div class="bubble" id="bubble-${msg.id}">
        ${renderMsgContent(msg,isOut)}
        <div class="msg-foot">${msg.isEdited?'<span class="edited-lbl">edited</span>':''}<span class="msg-time">${fmtTime(msg.createdAt)}</span>${renderTicks(msg)}</div>
      </div>
      ${msg.reactions?.length?renderReactions(msg):''}
    `;
  }
  renderSidebar();
}

// ── DELETE ──
function deleteMessage(msgId){
  if(!confirm('Delete this message?'))return;
  const msgs = STATE.messages[STATE.activeRoom?.id]||[];
  const msg = msgs.find(m=>m.id===msgId);
  if(!msg)return;
  msg.isDeleted = true;
  msg.content = null;
  msg.media = null;

  const bubble = document.getElementById(`bubble-${msg.id}`);
  if(bubble){
    bubble.innerHTML = `<div class="deleted-msg">🚫 This message was deleted</div><div class="msg-foot"><span class="msg-time">${fmtTime(msg.createdAt)}</span></div>`;
  }
  // Remove reactions
  const react = document.getElementById(`react-${msg.id}`);
  if(react) react.remove();
  renderSidebar();
}

// ── REACTIONS ──
function toggleReaction(msgId, emoji){
  const msgs = STATE.messages[STATE.activeRoom?.id]||[];
  const msg = msgs.find(m=>m.id===msgId);
  if(!msg)return;

  if(!msg.reactions) msg.reactions=[];
  const existing = msg.reactions.find(r=>r.emoji===emoji);
  if(existing){
    const idx = existing.userIds.indexOf('me');
    if(idx>-1){existing.userIds.splice(idx,1);if(!existing.userIds.length)msg.reactions=msg.reactions.filter(r=>r.emoji!==emoji);}
    else{existing.userIds.push('me');}
  } else {
    msg.reactions.push({emoji,userIds:['me']});
  }

  // Update reactions element
  const reactEl = document.getElementById(`react-${msgId}`);
  const wrap = document.getElementById(`wrap-${msgId}`);
  if(!wrap)return;
  if(reactEl) reactEl.remove();
  if(msg.reactions.length){
    wrap.insertAdjacentHTML('beforeend',renderReactions(msg));
  }
}

// ── QUICK REACT HOVER ──
let qrTimeout;
function showQuickReact(msgId, isOut){
  clearTimeout(qrTimeout);
  document.getElementById('qr-bar')?.remove();
  const msg = (STATE.messages[STATE.activeRoom?.id]||[]).find(m=>m.id===msgId);
  if(!msg||msg.isDeleted)return;
  const wrap = document.getElementById(`wrap-${msgId}`);
  if(!wrap)return;

  const bar = document.createElement('div');
  bar.className = 'qr-bar ' + (isOut ? 'out' : 'in');
  bar.id = 'qr-bar';
  bar.innerHTML = QUICK_EMOJIS.map(e=>`<button class="qr-btn" onclick="toggleReaction('${msgId}','${e}');event.stopPropagation()">${e}</button>`).join('');
  // Keep bar visible when mouse enters it
  bar.addEventListener('mouseenter', ()=>clearTimeout(qrTimeout));
  bar.addEventListener('mouseleave', ()=>{ qrTimeout=setTimeout(()=>bar.remove(),180); });
  wrap.style.position='relative';
  wrap.appendChild(bar);
}
function hideQuickReact(){
  qrTimeout = setTimeout(()=>{ document.getElementById('qr-bar')?.remove(); }, 180);
}

// ── FORWARD ──
function forwardMessage(msgId){
  const msgs = STATE.messages[STATE.activeRoom?.id]||[];
  const msg = msgs.find(m=>m.id===msgId);
  if(!msg)return;
  // Show forward modal
  openForwardModal(msg);
}

// ── CONTEXT MENU ──
function showCtxMenu(e, msgId){
  e.preventDefault();
  closeCtxMenu();
  const msgs = STATE.messages[STATE.activeRoom?.id]||[];
  const msg = msgs.find(m=>m.id===msgId);
  if(!msg)return;
  const isOwn = msg.senderId==='me';
  const x = Math.min(e.clientX, window.innerWidth-165);
  const y = Math.min(e.clientY, window.innerHeight-290);

  const menu = document.createElement('div');
  menu.className='ctx-menu';
  menu.id='ctx-menu';
  menu.style.cssText=`left:${x}px;top:${y}px`;
  menu.innerHTML=`
    <div class="ctx-item" onclick="replyToMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">↩️</span>Reply</div>
    <div class="ctx-item" onclick="openReactModal('${msgId}');closeCtxMenu()"><span class="ctx-icon">😊</span>React</div>
    <div class="ctx-item" onclick="forwardMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">➡️</span>Forward</div>
    ${!msg.isDeleted?`<div class="ctx-item" onclick="copyMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">📋</span>Copy</div>`:''}
    ${isOwn&&!msg.isDeleted?`<div class="ctx-div"></div><div class="ctx-item" onclick="editMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">✏️</span>Edit</div>`:''}
    ${isOwn||STATE.activeRoom?.type==='group'?`<div class="ctx-div"></div><div class="ctx-item danger" onclick="deleteMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">🗑️</span>Delete</div>`:''}
  `;
  document.body.appendChild(menu);
  STATE.contextMenu = menu;
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true}),50);
}
function closeCtxMenu(){
  STATE.contextMenu?.remove();
  STATE.contextMenu=null;
}
function copyMessage(msgId){
  const msgs = STATE.messages[STATE.activeRoom?.id]||[];
  const msg = msgs.find(m=>m.id===msgId);
  if(msg?.content) navigator.clipboard?.writeText(msg.content).then(()=>toast('📋','Copied','Message copied to clipboard'));
}

// ── REACT MODAL ──
function openReactModal(msgId){
  const overlay = document.createElement('div');
  overlay.className='overlay';overlay.id='react-overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
  overlay.innerHTML=`<div class="modal" style="width:320px">
    <div class="modal-head"><span class="modal-title">React to message</span><button class="modal-close" onclick="document.getElementById('react-overlay').remove()">✕</button></div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px">
      ${EMOJI_ALL.map(e=>`<button class="ep-btn" onclick="toggleReaction('${msgId}','${e}');document.getElementById('react-overlay').remove()">${e}</button>`).join('')}
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

// ── FORWARD MODAL ──
function openForwardModal(msg){
  const rooms = Object.values(STATE.rooms).filter(r=>r.id!==STATE.activeRoom?.id);
  const overlay = document.createElement('div');
  overlay.className='overlay';overlay.id='fwd-overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
  overlay.innerHTML=`<div class="modal">

    content:orig.content,media:orig.media,createdAt:new Date(),

// ── FILE UPLOAD ──
function triggerFileUpload(){document.getElementById('file-input')?.click()}
function handleFileUpload(event){
  const file = event.target.files?.[0];
  if(!file||!STATE.activeRoom)return;
  const url = URL.createObjectURL(file);
  const isImg = file.type.startsWith('image/');
  const isVid = file.type.startsWith('video/');
  const isAud = file.type.startsWith('audio/');
  const type = isImg?'image':isVid?'video':isAud?'audio':'document';
  const msg = {
    id:uid(),roomId:STATE.activeRoom.id,senderId:'me',type,
    content:null,createdAt:new Date(),readBy:[],deliveredTo:[],reactions:[],
    replyTo:null,isDeleted:false,isEdited:false,editHistory:[],
    media:{url,blobUrl:url,name:file.name,size:file.size,mimeType:file.type}
  };
  addMessage(msg);
  event.target.value='';
  toast('📎','File sent',file.name);
}

// ── VOICE RECORDING ──
function startRecording(){
  if(!STATE.activeRoom)return;
  STATE.recording=true;
  STATE.recordingTime=0;
  STATE.recordTimer=setInterval(()=>{
    STATE.recordingTime++;
    const t = document.querySelector('.rec-txt');
    if(t) t.textContent=`Recording voice message... ${STATE.recordingTime}s`;
  },1000);
  rerenderInput();
}
function stopRecording(){
  const duration = STATE.recordingTime;
  STATE.recording=false;
  clearInterval(STATE.recordTimer);
  STATE.recordTimer=null;
  STATE.recordingTime=0;
  if(duration>0 && STATE.activeRoom){
    const msg={
      id:uid(),roomId:STATE.activeRoom.id,senderId:'me',type:'audio',
      content:null,createdAt:new Date(),readBy:[],deliveredTo:[],reactions:[],
      replyTo:null,isDeleted:false,isEdited:false,editHistory:[],
      media:{duration,blobUrl:''}
    };
    addMessage(msg);
  }
  rerenderInput();
}
function cancelRecording(){
  STATE.recording=false;
  clearInterval(STATE.recordTimer);
  STATE.recordTimer=null;
  STATE.recordingTime=0;
  rerenderInput();
}
// Handle mic button press-hold
let micHoldTimer;
function micMousedown(){
  micHoldTimer = setTimeout(startRecording, 300);
}
function micMouseup(){
  clearTimeout(micHoldTimer);
  if(STATE.recording) stopRecording();
}

// ── AUDIO PLAYBACK ──
let currentAudio = null;
function playAudio(msgId, btn){
  const aud = document.getElementById(`aud-${msgId}`);
  if(!aud||!aud.src)return;
  if(currentAudio && currentAudio!==aud){currentAudio.pause();currentAudio.currentTime=0;}
  if(aud.paused){aud.play();btn.textContent='⏸';currentAudio=aud;}
  else{aud.pause();btn.textContent='▶';}
}
function audioEnded(msgId){
  const btn = document.getElementById(`pb-${msgId}`);
  if(btn) btn.textContent='▶';
}

let ncTab='direct', ncSelected=[], ncSearch='';
function openNewChat(){
  ncTab='direct';ncSelected=[];ncSearch='';
  document.getElementById('new-chat-modal')?.remove();
  const overlay=document.createElement('div');
  overlay.className='overlay';overlay.id='nc-overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};

      <button class="modal-close" onclick="document.getElementById('nc-overlay').remove()">✕</button>
    </div>
    <div class="mtabs">
      <button class="mtab on" id="nct-direct" onclick="switchNcTab('direct')">💬 Direct</button>
      <button class="mtab" id="nct-group" onclick="switchNcTab('group')">👥 Group</button>
    </div>
    <div id="nc-group-name-wrap" style="display:none;margin-bottom:10px">
      <input class="fi" id="nc-group-name" placeholder="Group name...">
    </div>
    <div id="nc-sel-tags" class="sel-tags"></div>
    <input class="fi" id="nc-search" style="margin-bottom:10px" placeholder="Search users..." oninput="ncSearchUsers(this.value)">
    <div class="res-list" id="nc-results"></div>
    <button class="modal-btn" id="nc-create-btn" onclick="createNewRoom()" disabled>Start Chat</button>
  </div>`;
  document.body.appendChild(overlay);
  ncRenderResults('');
}
function switchNcTab(tab){
  ncTab=tab;ncSelected=[];
  document.getElementById('nct-direct').classList.toggle('on',tab==='direct');
  document.getElementById('nct-group').classList.toggle('on',tab==='group');
  document.getElementById('nc-group-name-wrap').style.display=tab==='group'?'block':'none';
  ncUpdateBtn();ncRenderTags();ncRenderResults(ncSearch);
}
function ncSearchUsers(q){ncSearch=q;ncRenderResults(q)}
function ncRenderResults(q){
  const res=document.getElementById('nc-results');
  if(!res)return;
  const users=Object.values(STATE.users).filter(u=>u.id!=='me'&&(!q||u.username.toLowerCase().includes(q.toLowerCase())));
  if(!users.length){res.innerHTML='<div class="no-res">No users found</div>';return;}
  res.innerHTML=users.map(u=>{
    const sel=ncSelected.find(s=>s.id===u.id);
    return`<div class="user-res" onclick="ncToggleUser(${JSON.stringify(u).replace(/"/g,'&quot;')})">
      <div class="ur-av">${avatarEl(u,38)}</div>
      <div class="ur-info"><div class="ur-name">${escHtml(u.username)}</div><div class="ur-stat">${escHtml(u.status)}</div></div>
      ${ncTab==='group'?`<div class="chk${sel?' on':''}">${sel?'✓':''}</div>`:''}
    </div>`;
  }).join('');
}
function ncToggleUser(u){
  if(ncTab==='direct'){
    ncSelected=[u];
    ncRenderResults(ncSearch);
    ncRenderTags();
    ncUpdateBtn();
    setTimeout(createNewRoom,100);
    return;
  }
  const idx=ncSelected.findIndex(s=>s.id===u.id);
  if(idx>-1)ncSelected.splice(idx,1);else ncSelected.push(u);
  ncRenderTags();ncRenderResults(ncSearch);ncUpdateBtn();
}
function ncRenderTags(){
  const el=document.getElementById('nc-sel-tags');
  if(!el)return;
  el.innerHTML=ncSelected.map(u=>`<div class="sel-tag" onclick="ncToggleUser(${JSON.stringify(u).replace(/"/g,'&quot;')})">${escHtml(u.username)} ✕</div>`).join('');
}
function ncUpdateBtn(){
  const btn=document.getElementById('nc-create-btn');
  if(!btn)return;
  const gname=document.getElementById('nc-group-name')?.value?.trim();
  const ok=ncTab==='direct'?ncSelected.length===1:ncSelected.length>0&&gname;
  btn.disabled=!ok;
  btn.textContent=ncTab==='direct'&&ncSelected.length===1?`Chat with ${ncSelected[0].username}`:`Create Group`;
}
// Listen to group name input
document.addEventListener('input',e=>{if(e.target.id==='nc-group-name')ncUpdateBtn()});

function createNewRoom(){
  if(ncTab==='direct'){
    if(!ncSelected.length)return;
    const u=ncSelected[0];
    // Check existing
    const existing=Object.values(STATE.rooms).find(r=>r.type==='direct'&&r.members.some(m=>m.id===u.id));
    if(existing){
      document.getElementById('nc-overlay')?.remove();
      selectRoom(existing.id);return;
    }
    const room=mkRoom(uid(),'direct',[{id:'me',role:'member'},{id:u.id,role:'member'}]);
    STATE.rooms[room.id]=room;
    STATE.messages[room.id]=[];
    document.getElementById('nc-overlay')?.remove();
    renderSidebar();
    selectRoom(room.id);
  } else {
    const gname=document.getElementById('nc-group-name')?.value?.trim();
    if(!gname||!ncSelected.length)return;
    const members=[{id:'me',role:'owner'},...ncSelected.map(u=>({id:u.id,role:'member'}))];
    const room=mkRoom(uid(),'group',members);
    room.name=gname;
    STATE.rooms[room.id]=room;
    STATE.messages[room.id]=[];
    // System message
    const sysmsg={id:uid(),roomId:room.id,senderId:'me',type:'text',
      content:`${STATE.me.username} created the group`,createdAt:new Date(),
      readBy:[],deliveredTo:[],reactions:[],replyTo:null,isDeleted:false,isEdited:false,editHistory:[]};
    STATE.messages[room.id].push(sysmsg);
    room.lastMessage={content:sysmsg.content,timestamp:sysmsg.createdAt,type:'text',senderId:'me'};
    document.getElementById('nc-overlay')?.remove();
    renderSidebar();
    selectRoom(room.id);
    toast('👥','Group created',`"${gname}" with ${members.length} members`);
  }
}

    content:`${u.username} was added to the group`,createdAt:new Date(),
    readBy:[],deliveredTo:[],reactions:[],replyTo:null,isDeleted:false,isEdited:false,editHistory:[]};

}

function toast(icon, title, body, duration=4000){
  const cont=document.getElementById('toast-cont');
  if(!cont)return;
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<div class="ti">${icon}</div><div class="tt"><div class="tt-title">${escHtml(title)}</div><div class="tt-body">${escHtml(body)}</div></div>`;
  t.onclick=()=>t.remove();
  cont.appendChild(t);

}

// SIMULATIONS (incoming messages)
// ══════════════════════════════════════════════════════════════════════════════
const REPLIES = [
  'Got it!','Sure thing 👍','Makes sense!','Interesting...','On it! 🚀',
  'Thanks for the update!','Sounds good 🙌','Will do!','I\'ll check that','Perfect!',
  'Great work! 🔥','Noted 📝','Absolutely!','Let me think about that...','👍',
  'Can we discuss this later?','That\'s awesome!','I agree completely','What time?','See you there!'
];

function simulateReply(room, trigger){
  if(!STATE.rooms[room.id])return;
  const other = getRoomOtherUser(room);
  if(!other)return;
  // Stop typing
  room.typingUsers=[];
  renderSidebar();
  if(STATE.activeRoom?.id===room.id){
    const stat=document.getElementById('ch-status');
    if(stat){
      const isOnline=other.isOnline;
      const statusTxt=room.type==='group'?`${room.members.length} members`:
        isOnline?`<span class="dot"></span><span style="color:var(--grn)">Online</span>`:
        `<span class="dot off"></span>Last seen ${fmtTime(other.lastSeen)||'a while ago'}`;
      stat.innerHTML=statusTxt;
    }
  }

  const reply = REPLIES[Math.floor(Math.random()*REPLIES.length)];
  const msg={
    id:uid(),roomId:room.id,senderId:other.id,type:'text',
    content:reply,createdAt:new Date(),
    readBy:STATE.activeRoom?.id===room.id?['me']:[],
    deliveredTo:['me'],reactions:[],replyTo:null,
    isDeleted:false,isEdited:false,editHistory:[]
  };
  addMessage(msg);
}

function simulateTyping(roomId){
  const room=STATE.rooms[roomId];
  if(!room)return;
  const other=getRoomOtherUser(room);
  if(!other)return;
  room.typingUsers=[other.id];
  renderSidebar();
  if(STATE.activeRoom?.id===roomId){
    const stat=document.getElementById('ch-status');
    if(stat) stat.innerHTML=`<span style="color:var(--grn);font-style:italic">typing...</span>`;
  }
}

// Periodic online status flicker
function startSimulator(){
  // Occasional messages from random contacts
  setInterval(()=>{
    if(!Object.keys(STATE.rooms).length)return;
    const rooms=Object.values(STATE.rooms);
    const room=rooms[Math.floor(Math.random()*rooms.length)];
    if(!room||room.id===STATE.activeRoom?.id)return;
    const other=getRoomOtherUser(room);
    if(!other||!other.isOnline)return;

    const proactive=[
      'Hey, you around?','Quick question...','Have a minute to chat?',
      'Just saw this and thought of you!','Weekend plans?','Can you check this?'
    ];
    const msg={
      id:uid(),roomId:room.id,senderId:other.id,type:'text',
      content:proactive[Math.floor(Math.random()*proactive.length)],
      createdAt:new Date(),readBy:[],deliveredTo:['me'],
      reactions:[],replyTo:null,isDeleted:false,isEdited:false,editHistory:[]
    };
    addMessage(msg);
  }, 25000 + Math.random()*35000);

  // Online status changes
  setInterval(()=>{
    Object.values(STATE.users).filter(u=>u.id!=='me').forEach(u=>{
      if(Math.random()<0.15) u.isOnline=!u.isOnline;
    });
    renderSidebar();
    if(STATE.activeRoom){
      const other=getRoomOtherUser(STATE.activeRoom);
      if(other){
        const stat=document.getElementById('ch-status');
        if(stat){
          const s=STATE.activeRoom.type==='group'?`${STATE.activeRoom.members.length} members`:
            other.isOnline?`<span class="dot"></span><span style="color:var(--grn)">Online</span>`:
            `<span class="dot off"></span>Last seen just now`;
          stat.innerHTML=s;
        }
      }
    }
  },30000);
}

function simulateCall(type){
  toast(type==='voice'?'📞':'📹',`${type==='voice'?'Voice':'Video'} call`,`Calling ${getRoomDisplayName(STATE.activeRoom||{})}...`);
  setTimeout(()=>toast('📵','Call ended','The call has ended',3000),3000);
}

// ══════════════════════════════════════════════════════════════════════════════
// SIGN OUT
// ══════════════════════════════════════════════════════════════════════════════
function signOut(){
  document.getElementById('settings-overlay')?.remove();
  STATE.me=null;STATE.activeRoom=null;STATE.rooms={};STATE.messages={};
  document.getElementById('app').classList.remove('visible');
  const auth=document.getElementById('auth');
  auth.style.display='flex';
  setTimeout(()=>{auth.style.opacity='1';auth.style.pointerEvents='auto';},50);
  const pe=document.getElementById('inp-phone'); if(pe)pe.value='';
  document.getElementById('inp-pass').value='';
  document.getElementById('auth-err').style.display='none';
  switchAuthTab('login');
  renderRegisteredAccounts();
}

// ══════════════════════════════════════════════════════════════════════════════
// MOBILE
// ══════════════════════════════════════════════════════════════════════════════
function backToSidebar(){
  document.getElementById('sidebar').classList.remove('mob-hidden');
  document.getElementById('main').classList.add('mob-hidden');
  STATE.activeRoom=null;
  renderSidebar();
}

// ══════════════════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeCtxMenu();
    closeLightbox();
    if(STATE.showEmojiPicker){STATE.showEmojiPicker=false;rerenderInput();}
    document.getElementById('nc-overlay')?.remove();
    document.getElementById('settings-overlay')?.remove();
    document.getElementById('mpp-overlay')?.remove();
    document.getElementById('fwd-overlay')?.remove();
    document.getElementById('react-overlay')?.remove();
    document.getElementById('am-overlay')?.remove();
  }
  // Ctrl+K → new chat
  if(e.ctrlKey&&e.key==='k'){e.preventDefault();openNewChat();}
  // Ctrl+/ → search in sidebar
  if(e.ctrlKey&&e.key==='/'){e.preventDefault();document.getElementById('sb-search-inp')?.focus();}
});

// Close dropdown on scroll
document.addEventListener('scroll',()=>{closeCtxMenu();},true);

// ══════════════════════════════════════════════════════════════════════════════
// ENTER KEY ON AUTH
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && document.getElementById('auth').style.display!=='none'){
    handleAuth();
  }
});

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
document.documentElement.setAttribute('data-theme',STATE.theme);
document.getElementById('theme-btn').textContent=STATE.theme==='dark'?'🌙':'☀️';
document.getElementById('auth').style.opacity='1';
document.getElementById('app').style.display='flex';
renderRegisteredAccounts();
</script>
