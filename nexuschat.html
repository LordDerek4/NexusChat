<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusChat</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%235d6af0'/%3E%3Cstop offset='100%25' stop-color='%233ddc97'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='12' fill='url(%23g)'/%3E%3Crect x='13' y='14' width='22' height='16' rx='5' fill='white'/%3E%3Cpath d='M17 30 L15 36 L21 30 Z' fill='white'/%3E%3Ccircle cx='19' cy='22' r='2.2' fill='%235d6af0'/%3E%3Ccircle cx='24' cy='22' r='2.2' fill='%235d6af0'/%3E%3Ccircle cx='29' cy='22' r='2.2' fill='%235d6af0'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- QR Code library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#0d0e14;--bg1:#13151f;--bg2:#181b27;--bg3:#1e2130;--bg4:#242840;
  --surface:#1a1d2e;--border:#272b3f;--border2:#2f3450;
  --txt1:#e6e8f0;--txt2:#8b90b0;--txt3:#555a78;
  --acc:#5d6af0;--acc2:#7c85f5;--acc-glow:rgba(93,106,240,.18);
  --grn:#3ddc97;--grn-dim:rgba(61,220,151,.12);
  --red:#f0607a;--yel:#f0c060;
  --out-bg:#2a2f5a;--out-txt:#d8dbff;
  --in-bg:#1e2130;--in-txt:#e6e8f0;
  --rad:14px;--shadow:0 8px 32px rgba(0,0,0,.5);
}
[data-theme=light]{
  --bg0:#edf0f8;--bg1:#f5f7ff;--bg2:#ffffff;--bg3:#eef0fb;--bg4:#e5e8f5;
  --surface:#ffffff;--border:#dde0f0;--border2:#cdd0e8;
  --txt1:#1a1d30;--txt2:#5a5f80;--txt3:#9098be;
  --acc:#4a57e8;--acc2:#6570f0;--acc-glow:rgba(74,87,232,.12);
  --grn:#28b87a;--out-bg:#4a57e8;--out-txt:#ffffff;
  --in-bg:#ffffff;--in-txt:#1a1d30;
}
html,body{height:100%;overflow:hidden;overflow-x:hidden;max-width:100vw;font-family:'Sora',sans-serif;font-size:14px;background:var(--bg0);color:var(--txt1)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── AUTH ── */
#auth{position:fixed;inset:0;display:flex;align-items:flex-start;justify-content:center;background:var(--bg0);z-index:9999;overflow-y:auto;padding:24px 16px;}
.auth-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.auth-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 10s ease-in-out infinite}
.auth-orb:nth-child(1){width:600px;height:600px;background:radial-gradient(circle,rgba(93,106,240,.12),transparent 70%);top:-200px;left:-150px;animation-duration:12s}
.auth-orb:nth-child(2){width:400px;height:400px;background:radial-gradient(circle,rgba(61,220,151,.08),transparent 70%);bottom:-100px;right:-100px;animation-duration:8s;animation-delay:-4s}
.auth-orb:nth-child(3){width:300px;height:300px;background:radial-gradient(circle,rgba(240,96,122,.06),transparent 70%);top:40%;right:20%;animation-duration:15s;animation-delay:-7s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(.95)}}

.auth-card{
  background:var(--bg1);border:1px solid var(--border);border-radius:28px;
  padding:36px 40px;width:100%;max-width:460px;position:relative;z-index:1;
  box-shadow:0 32px 100px rgba(0,0,0,.7);
  animation:authSlideIn .5s cubic-bezier(.16,1,.3,1);
  margin:auto;
}
@keyframes authSlideIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.auth-logo-icon{
  width:48px;height:48px;border-radius:16px;
  background:linear-gradient(135deg,var(--acc),var(--grn));
  display:flex;align-items:center;justify-content:center;font-size:24px;
  box-shadow:0 8px 24px rgba(93,106,240,.4);
}
.auth-logo-name{font-size:22px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center}
.auth-step{
  display:none;animation:stepIn .3s ease;
}
.auth-step.active{display:block}
@keyframes stepIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.auth-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.auth-sub{color:var(--txt2);margin-bottom:20px;line-height:1.5}
.auth-tabs{display:flex;background:var(--bg2);border-radius:14px;padding:4px;margin-bottom:18px;gap:4px}
.auth-tab{
  flex:1;padding:10px;border:none;background:transparent;color:var(--txt2);
  cursor:pointer;border-radius:10px;font-family:'Sora',sans-serif;font-size:13.5px;font-weight:500;
  transition:all .25s;
}
.auth-tab.on{background:var(--acc);color:#fff;box-shadow:0 4px 12px rgba(93,106,240,.35)}
.fg{margin-bottom:12px}
.fl{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--txt2);margin-bottom:7px}
.fl-req{color:var(--red);font-size:10px}
.fi{
  width:100%;padding:12px 14px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:12px;color:var(--txt1);font-family:'Sora',sans-serif;font-size:14px;
  outline:none;transition:all .2s;
}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 4px var(--acc-glow);background:var(--bg1)}
.fi::placeholder{color:var(--txt3)}
.fi.valid{border-color:var(--grn)}
.fi.invalid{border-color:var(--red)}
.fi-hint{font-size:11.5px;margin-top:5px;padding:0 2px}
.fi-hint.ok{color:var(--grn)}
.fi-hint.err{color:var(--red)}

/* Phone input with flag */
.phone-field{display:flex;gap:8px;align-items:stretch}
.phone-country-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;
  padding:0 12px;cursor:pointer;transition:all .2s;white-space:nowrap;
  min-width:90px;
}
.phone-country-btn:hover{border-color:var(--acc)}
.phone-country-btn .flag{font-size:20px;line-height:1}
.phone-country-btn .code{font-size:13.5px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--txt1)}
.phone-country-btn .chevron{color:var(--txt3);font-size:10px;margin-left:2px}
.phone-number-input{flex:1}

/* Country search dropdown */
.country-dropdown{
  position:fixed;z-index:10000;
  background:var(--bg1);border:1px solid var(--border);border-radius:16px;
  width:320px;max-height:340px;box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:menuIn .15s ease-out;overflow:hidden;display:flex;flex-direction:column;
}
.cs-search{
  padding:12px;border-bottom:1px solid var(--border);
}
.cs-search input{
  width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:9px;color:var(--txt1);font-family:'Sora',sans-serif;font-size:13px;
  outline:none;
}
.cs-search input:focus{border-color:var(--acc)}
.cs-list{overflow-y:auto;flex:1}
.cs-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  cursor:pointer;transition:all .15s;
}
.cs-item:hover{background:var(--bg3)}
.cs-item.selected{background:var(--acc-glow)}
.cs-flag{font-size:20px;flex-shrink:0}
.cs-name{flex:1;font-size:13px;font-weight:500}
.cs-code{font-size:12px;color:var(--txt3);font-family:'JetBrains Mono',monospace}

.auth-err{
  background:rgba(240,96,122,.1);border:1px solid rgba(240,96,122,.3);
  border-radius:10px;padding:10px 14px;color:var(--red);font-size:13px;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.auth-btn{
  width:100%;padding:14px;background:linear-gradient(135deg,var(--acc) 0%,#7b6ef5 100%);
  border:none;border-radius:12px;color:#fff;font-family:'Sora',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;
  transition:all .25s;box-shadow:0 6px 20px rgba(93,106,240,.35);
  position:relative;overflow:hidden;
}
.auth-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(93,106,240,.5)}
.auth-btn:hover::after{opacity:1}
.auth-btn:active{transform:none}
.auth-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.auth-btn-secondary{
  width:100%;padding:12px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:12px;color:var(--txt1);font-family:'Sora',sans-serif;
  font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;transition:all .2s;
}
.auth-btn-secondary:hover{border-color:var(--acc);background:var(--bg3)}

.reg-accounts{margin-top:20px}
.reg-label{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.reg-label::before,.reg-label::after{content:'';flex:1;height:1px;background:var(--border)}
.reg-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto}
.reg-item{
  display:flex;align-items:center;gap:11px;padding:10px 13px;
  background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;
  cursor:pointer;transition:all .2s;
}
.reg-item:hover{border-color:var(--acc);background:var(--bg3);transform:translateX(3px)}
.reg-flag{font-size:22px;flex-shrink:0}
.reg-info{flex:1;min-width:0}
.reg-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reg-region{font-size:11.5px;color:var(--txt2);margin-top:1px}
.reg-phone{font-size:11px;color:var(--txt3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.reg-arrow{color:var(--acc);font-size:14px;flex-shrink:0}

/* ── APP SHELL ── */
#app{display:flex;height:100vh;opacity:0;transition:opacity .4s}
#app.visible{opacity:1}

/* ── SIDEBAR ── */
.sidebar{
  width:300px;min-width:260px;background:var(--bg1);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:width .3s;flex-shrink:0;
}
.sb-head{padding:16px 14px 10px;display:flex;align-items:center;gap:8px}
.my-avatar{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--grn));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;overflow:hidden;position:relative;
}
.my-avatar img{width:100%;height:100%;object-fit:cover}
.my-avatar .online-ring{position:absolute;bottom:0;right:0;width:10px;height:10px;background:var(--grn);border-radius:50%;border:2px solid var(--bg1)}
.sb-title{flex:1;font-size:17px;font-weight:700;letter-spacing:-.3px}
.ib{
  width:34px;height:34px;background:var(--bg3);border:none;border-radius:9px;
  color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .2s;flex-shrink:0;
}
.ib:hover{background:var(--bg4);color:var(--txt1)}
.ib.active{background:var(--acc);color:#fff}
.sb-search{padding:0 12px 10px;position:relative}
.sb-search input{
  width:100%;padding:9px 14px 9px 36px;background:var(--bg2);
  border:1px solid var(--border);border-radius:10px;color:var(--txt1);
  font-family:'Sora',sans-serif;font-size:13.5px;outline:none;transition:all .2s;
}
.sb-search input:focus{border-color:var(--acc)}
.sb-search input::placeholder{color:var(--txt3)}
.sb-search .si{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:14px;pointer-events:none}
.chat-list{flex:1;overflow-y:auto;padding:0 6px 8px}
.chat-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:2px;position:relative}
.chat-item:hover{background:var(--bg3)}
.chat-item.act{background:var(--bg4)}
.chat-item.act::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--acc);border-radius:0 3px 3px 0}
.ci-av{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;color:var(--acc);position:relative;overflow:hidden}
.ci-av img{width:100%;height:100%;object-fit:cover}
.ci-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--grn);border-radius:50%;border:2px solid var(--bg1)}
.ci-info{flex:1;min-width:0}
.ci-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.ci-last{color:var(--txt2);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;display:flex;align-items:center;gap:3px}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ci-time{color:var(--txt3);font-size:11px}
.badge{background:var(--acc);color:#fff;border-radius:10px;padding:1px 6px;font-size:10.5px;font-weight:700;min-width:18px;text-align:center}
.badge.muted{background:var(--txt3)}
.pin-icon{font-size:10px;color:var(--yel)}
.grp-tag{font-size:9.5px;background:var(--grn-dim);color:var(--grn);padding:1px 5px;border-radius:4px;font-weight:600}
.sb-empty{text-align:center;padding:40px 20px;color:var(--txt3)}

/* Discover tab */
.sb-tabs{display:flex;padding:0 12px 10px;gap:4px}
.sb-tab{
  flex:1;padding:7px;border:none;background:transparent;color:var(--txt2);
  cursor:pointer;border-radius:8px;font-family:'Sora',sans-serif;font-size:12.5px;font-weight:500;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;
}
.sb-tab.on{background:var(--bg4);color:var(--txt1)}
.sb-tab:hover:not(.on){background:var(--bg3)}

/* Discover panel */
.discover-panel{flex:1;overflow-y:auto;padding:0 10px 8px;display:flex;flex-direction:column;gap:8px}
.disc-section-title{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:8px 4px 4px}
.disc-search-wrap{position:relative;padding:0 2px}
.disc-search-wrap .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.disc-search{width:100%;padding:10px 14px 10px 36px;background:var(--bg2);border:1.5px solid var(--border);border-radius:11px;color:var(--txt1);font-family:'Sora',sans-serif;font-size:13.5px;outline:none;transition:all .2s}
.disc-search:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-glow)}
.disc-search::placeholder{color:var(--txt3)}
.disc-filter-row{display:flex;gap:5px;padding:0 2px}
.disc-filter{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;font-family:'Sora',sans-serif;font-size:12px;font-weight:500;transition:all .2s;white-space:nowrap}
.disc-filter.on{background:var(--acc);border-color:var(--acc);color:#fff}
.disc-filter:hover:not(.on){border-color:var(--acc);color:var(--txt1)}
.disc-user-card{
  display:flex;align-items:center;gap:10px;padding:10px 11px;
  background:var(--bg2);border:1px solid var(--border);border-radius:13px;
  cursor:pointer;transition:all .2s;
}
.disc-user-card:hover{border-color:var(--acc);background:var(--bg3);transform:translateY(-1px)}
.duca-av{width:42px;height:42px;border-radius:50%;flex-shrink:0;overflow:hidden;position:relative}
.duca-online{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--grn);border-radius:50%;border:2px solid var(--bg2)}
.duca-info{flex:1;min-width:0}
.duca-name{font-weight:600;font-size:13.5px}
.duca-handle{font-size:11.5px;color:var(--acc);font-family:'JetBrains Mono',monospace;margin-top:1px}
.duca-status{font-size:11.5px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;margin-top:1px}
.duca-actions{display:flex;gap:4px;flex-shrink:0}
.duca-btn{
  width:30px;height:30px;border-radius:8px;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;
  transition:all .15s;
}
.duca-btn.chat{background:var(--acc);color:#fff}
.duca-btn.chat:hover{background:var(--acc2);transform:scale(1.08)}
.duca-btn.add{background:var(--grn-dim);color:var(--grn);border:1px solid rgba(61,220,151,.3)}
.duca-btn.add:hover{background:rgba(61,220,151,.2);transform:scale(1.08)}
.duca-btn.mutual{background:rgba(93,106,240,.15);color:var(--acc);border:1px solid rgba(93,106,240,.35);cursor:default;font-size:11px;width:auto;padding:0 8px;border-radius:8px}
.duca-btn.added{background:var(--bg3);color:var(--txt2);border:1px solid var(--border);cursor:default;font-size:11px;width:auto;padding:0 8px;border-radius:8px}
.duca-btn.added-you{background:rgba(61,220,151,.1);color:var(--grn);border:1px solid rgba(61,220,151,.3);font-size:11px;width:auto;padding:0 8px;border-radius:8px}
.disc-tools{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 2px}
.disc-tool-btn{
  display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 10px;
  background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;
  cursor:pointer;transition:all .2s;
}
.disc-tool-btn:hover{border-color:var(--acc);background:var(--bg3);transform:translateY(-2px)}
.disc-tool-icon{font-size:24px}
.disc-tool-label{font-size:12px;font-weight:600;text-align:center;color:var(--txt2)}
.disc-no-res{text-align:center;padding:24px;color:var(--txt3);font-size:13px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg0)}
.msgs-outer{flex:1;position:relative;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.msgs-area{
  flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:1px;
  background:var(--bg0);
  background-image:radial-gradient(ellipse at 15% 10%,rgba(93,106,240,.04) 0%,transparent 50%),radial-gradient(ellipse at 85% 90%,rgba(61,220,151,.03) 0%,transparent 50%);
}
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--txt3)}
.no-chat-icon{width:88px;height:88px;border-radius:50%;background:var(--bg1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.no-chat h2{font-size:22px;font-weight:700;color:var(--txt2)}
.no-chat p{font-size:13.5px;text-align:center;max-width:280px}

/* ── CHAT HEADER ── */
.chat-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg1);flex-shrink:0}
.ch-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;color:var(--acc);overflow:hidden}
.ch-av img{width:100%;height:100%;object-fit:cover}
.ch-info{flex:1;min-width:0}
.ch-name{font-weight:700;font-size:15.5px;letter-spacing:-.2px}
.ch-status{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:5px;margin-top:2px}
.ch-status .dot{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block}
.ch-status .dot.off{background:var(--txt3)}
.ch-actions{display:flex;gap:5px}
.ch-back{display:none;align-items:center;justify-content:center}

/* ── MESSAGES ── */
.date-sep{display:flex;align-items:center;gap:12px;margin:14px 0 8px;color:var(--txt3);font-size:11.5px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.msg-row{display:flex;align-items:flex-end;gap:7px;animation:msgpop .2s ease-out;margin-bottom:1px}
@keyframes msgpop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-row.out{flex-direction:row-reverse}
.msg-row.consec .mav{visibility:hidden}
.mav{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--acc);overflow:hidden}
.mav img{width:100%;height:100%;object-fit:cover}
.msg-wrap{max-width:62%;position:relative}
.bubble{padding:9px 13px;border-radius:18px;word-break:break-word;position:relative;cursor:default;transition:filter .15s}
.bubble:hover{filter:brightness(1.05)}
.msg-row.out .bubble{background:var(--out-bg);color:var(--out-txt);border-bottom-right-radius:4px}
.msg-row:not(.out) .bubble{background:var(--in-bg);color:var(--in-txt);border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-row.consec.out .bubble{border-bottom-right-radius:18px}
.msg-row.consec:not(.out) .bubble{border-bottom-left-radius:18px}
.msg-sender{font-size:11px;font-weight:600;color:var(--grn);margin-bottom:4px}
.msg-txt{font-size:14px;line-height:1.55}
.msg-foot{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:4px}
.msg-time{font-size:10.5px;color:var(--txt3);opacity:.8}
.msg-row.out .msg-time{color:rgba(200,205,255,.55)}
.ticks{font-size:12px;color:var(--txt3);line-height:1}
.ticks.read{color:var(--grn)}
.edited-lbl{font-size:10px;color:var(--txt3);font-style:italic}
.rp-box{background:rgba(0,0,0,.15);border-radius:9px;padding:6px 9px;margin-bottom:7px;border-left:3px solid var(--grn)}
.rp-sender{font-size:11px;font-weight:600;color:var(--grn);margin-bottom:2px}
.rp-txt{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.rpill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 7px;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:2px;transition:all .15s}
.rpill:hover{border-color:var(--acc);background:var(--bg4)}
.rpill.mine{border-color:var(--acc);background:var(--acc-glow)}
.rpill .rc{font-size:10.5px;color:var(--txt2)}
.msg-img{max-width:260px;max-height:300px;border-radius:12px;display:block;cursor:pointer;object-fit:cover}
.msg-doc{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.1);border-radius:10px;padding:10px}
.doc-icon{font-size:28px;flex-shrink:0}
.doc-info{min-width:0}
.doc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:min(160px,40vw)}
.doc-size{font-size:11px;color:var(--txt2);margin-top:2px}
.audio-msg{display:flex;align-items:center;gap:10px;min-width:0;width:100%;max-width:220px}
.play-btn{width:34px;height:34px;border-radius:50%;background:var(--acc);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex-shrink:0;font-size:12px;transition:all .15s}
.play-btn:hover{background:var(--acc2);transform:scale(1.05)}
.waveform{flex:1;display:flex;align-items:center;gap:2px;height:30px;cursor:pointer}
.wb{flex:1;background:currentColor;border-radius:2px;opacity:.5;transition:opacity .15s;animation:ww 1.5s ease-in-out infinite}
@keyframes ww{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
.audio-dur{font-size:11px;color:var(--txt2);font-family:'JetBrains Mono',monospace}
.deleted-msg{font-style:italic;color:var(--txt3);font-size:13px;display:flex;align-items:center;gap:6px}
.scroll-to-bottom{position:absolute;bottom:12px;right:18px;z-index:30;width:36px;height:36px;border-radius:50%;background:var(--acc);border:2px solid var(--bg0);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(93,106,240,.5);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
.scroll-to-bottom.show{opacity:1;pointer-events:all}
.scroll-to-bottom:hover{transform:scale(1.1)}
.stb-badge{position:absolute;top:-4px;right:-4px;background:var(--grn);color:#fff;border-radius:10px;font-size:9px;font-weight:700;padding:1px 4px;border:2px solid var(--bg0);min-width:16px;text-align:center;display:none}


/* ── INPUT AREA ── */
.input-wrap{padding:10px 14px;background:var(--bg1);border-top:1px solid var(--border);flex-shrink:0;position:relative}
.reply-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:9px;padding:7px 11px;margin-bottom:9px;border-left:3px solid var(--acc)}
.rb-content{flex:1;min-width:0}
.rb-sender{font-size:11.5px;font-weight:600;color:var(--acc);margin-bottom:1px}
.rb-txt{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-close{color:var(--txt3);cursor:pointer;padding:3px;font-size:16px;transition:color .15s}
.rb-close:hover{color:var(--red)}
.input-row{display:flex;align-items:flex-end;gap:7px}
.input-actions{display:flex;gap:3px;flex-shrink:0;align-items:flex-end}
.msg-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:10px 14px;color:var(--txt1);font-family:'Sora',sans-serif;font-size:14px;resize:none;outline:none;min-height:44px;max-height:150px;transition:border-color .2s;line-height:1.5;overflow-y:auto}
.msg-input:focus{border-color:var(--acc)}
.msg-input::placeholder{color:var(--txt3)}
.send-btn{width:44px;height:44px;flex-shrink:0;background:linear-gradient(135deg,var(--acc),#7b6ef5);border:none;border-radius:13px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;box-shadow:0 3px 12px rgba(93,106,240,.4)}
.send-btn:hover{transform:scale(1.06);box-shadow:0 6px 18px rgba(93,106,240,.5)}
.send-btn:active{transform:scale(.97)}
.rec-ind{flex:1;background:var(--bg2);border:1px solid rgba(240,96,122,.4);border-radius:13px;padding:10px 14px;display:flex;align-items:center;gap:10px;min-height:44px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:recblink 1s ease-in-out infinite;flex-shrink:0}
@keyframes recblink{0%,100%{opacity:1}50%{opacity:.2}}
.rec-txt{color:var(--red);font-size:13.5px;flex:1}
.rec-cancel{color:var(--txt3);cursor:pointer;font-size:13px;transition:color .15s}
.rec-cancel:hover{color:var(--red)}

/* ── EMOJI PICKER ── */
.emoji-picker{position:absolute;bottom:70px;left:14px;background:var(--bg1);border:1px solid var(--border);border-radius:16px;padding:12px;width:292px;box-shadow:var(--shadow);z-index:100;animation:menuIn .15s ease-out}
.ep-search{width:100%;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt1);font-family:'Sora',sans-serif;font-size:13px;outline:none;margin-bottom:10px}
.ep-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:1px;max-height:200px;overflow-y:auto}
.ep-btn{padding:5px;border:none;background:transparent;cursor:pointer;border-radius:7px;font-size:19px;transition:all .15s;text-align:center}
.ep-btn:hover{background:var(--bg3);transform:scale(1.2)}

/* ── CONTEXT MENU ── */
.ctx-menu{position:fixed;background:var(--bg1);border:1px solid var(--border);border-radius:13px;padding:5px;min-width:155px;box-shadow:var(--shadow);z-index:500;animation:menuIn .15s ease-out}
@keyframes menuIn{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;cursor:pointer;font-size:13.5px;transition:all .15s}
.ctx-item:hover{background:var(--bg3)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:rgba(240,96,122,.1)}
.ctx-icon{font-size:14px;width:18px;text-align:center}
.ctx-div{height:1px;background:var(--border);margin:3px 5px}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:400;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:22px;padding:26px;width:440px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:slideUp .2s ease-out;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;background:var(--bg3);border:none;border-radius:8px;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.modal-close:hover{background:var(--bg4);color:var(--txt1)}
.modal-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--acc),#7b6ef5);border:none;border-radius:11px;color:#fff;font-family:'Sora',sans-serif;font-size:14.5px;font-weight:600;cursor:pointer;margin-top:14px;transition:all .2s}
.modal-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(93,106,240,.35)}
.modal-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.user-res{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:all .15s}
.user-res:hover{background:var(--bg3)}
.ur-av{width:38px;height:38px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--acc);font-size:14px;flex-shrink:0;overflow:hidden}
.ur-av img{width:100%;height:100%;object-fit:cover}
.ur-info{flex:1}
.ur-name{font-weight:600;font-size:13.5px}
.ur-stat{font-size:12px;color:var(--txt2);margin-top:1px}
.chk{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:11px}
.chk.on{background:var(--acc);border-color:var(--acc);color:#fff}
.sel-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:0}
.sel-tag{background:var(--acc-glow);border:1px solid var(--acc);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--acc);cursor:pointer;font-weight:500}
.sel-tag:hover{background:rgba(240,96,122,.15);border-color:var(--red);color:var(--red)}
.mtabs{display:flex;gap:6px;margin-bottom:16px}
.mtab{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.mtab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.res-list{max-height:260px;overflow-y:auto}
.no-res{text-align:center;color:var(--txt3);padding:20px;font-size:13px}

/* ── PROFILE PANEL ── */
.profile-panel{width:280px;background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.pp-head{padding:16px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.pp-title{font-weight:700;font-size:15px}
.pp-av{width:80px;height:80px;border-radius:50%;margin:24px auto 12px;background:linear-gradient(135deg,var(--acc),var(--grn));display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;overflow:hidden}
.pp-av img{width:100%;height:100%;object-fit:cover}
.pp-name{text-align:center;font-size:17px;font-weight:700;padding:0 14px}
.pp-status{text-align:center;color:var(--txt2);font-size:12.5px;padding:4px 14px 0}
.pp-actions{display:flex;flex-direction:column;padding:16px 12px;gap:6px}
.pp-action{display:flex;align-items:center;gap:10px;padding:10px 11px;background:var(--bg2);border:none;border-radius:10px;cursor:pointer;color:var(--txt1);font-family:'Sora',sans-serif;font-size:13.5px;text-align:left;transition:all .15s}
.pp-action:hover{background:var(--bg3)}
.pp-action.danger{color:var(--red)}
.pp-action.danger:hover{background:rgba(240,96,122,.1)}

/* ── QR CODE MODAL ── */


/* ── INVITE SYSTEM ── */
.invite-link-wrap{
  background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.invite-link-txt{flex:1;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.invite-copy-btn{
  padding:6px 12px;background:var(--acc);border:none;border-radius:8px;
  color:#fff;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.invite-copy-btn:hover{background:var(--acc2)}
.invite-share-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.invite-share-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  cursor:pointer;transition:all .2s;
}
.invite-share-item:hover{border-color:var(--acc);background:var(--bg3);transform:translateY(-2px)}
.invite-share-icon{font-size:22px}
.invite-share-label{font-size:11.5px;font-weight:500;color:var(--txt2)}

/* ── PROFILE PREVIEW POPUP ── */
.profile-preview{
  background:var(--bg1);border:1px solid var(--border);border-radius:22px;
  padding:26px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:slideUp .2s ease-out;
}
.pp-preview-av{
  width:80px;height:80px;border-radius:50%;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--acc),var(--grn));
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:700;color:#fff;overflow:hidden;
}
.pp-preview-av img{width:100%;height:100%;object-fit:cover}
.pp-preview-name{text-align:center;font-size:19px;font-weight:700;margin-bottom:4px}
.pp-preview-handle{text-align:center;font-size:13px;color:var(--acc);font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.pp-preview-status{text-align:center;font-size:13px;color:var(--txt2);margin-bottom:8px;padding:0 12px}
.pp-preview-phone{text-align:center;font-size:12px;color:var(--txt3);font-family:'JetBrains Mono',monospace;margin-bottom:18px}
.pp-online-badge{display:inline-flex;align-items:center;gap:5px;background:var(--grn-dim);border:1px solid rgba(61,220,151,.3);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--grn);font-weight:600;margin:0 auto 16px;display:flex;justify-content:center}
.pp-online-dot{width:7px;height:7px;border-radius:50%;background:var(--grn)}
.pp-preview-actions{display:flex;gap:8px;margin-top:4px}
.pp-action-btn{
  flex:1;padding:11px;border-radius:12px;border:none;
  font-family:'Sora',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.pp-action-btn.primary{background:linear-gradient(135deg,var(--acc),#7b6ef5);color:#fff;box-shadow:0 4px 14px rgba(93,106,240,.35)}
.pp-action-btn.primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(93,106,240,.5)}
.pp-action-btn.secondary{background:var(--bg2);border:1.5px solid var(--border);color:var(--txt1)}
.pp-action-btn.secondary:hover{border-color:var(--grn);background:var(--bg3)}

/* ── PRIVACY SETTINGS ── */
.privacy-section{margin-bottom:20px}
.privacy-section-title{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.privacy-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.privacy-row:last-child{border-bottom:none}
.pr-label{font-size:13.5px;font-weight:500}
.pr-sub{font-size:11.5px;color:var(--txt2);margin-top:2px}
.privacy-select{
  background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;
  color:var(--txt1);font-family:'Sora',sans-serif;font-size:12.5px;padding:6px 10px;
  cursor:pointer;outline:none;transition:border-color .2s;
}
.privacy-select:focus{border-color:var(--acc)}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bg4);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--acc)}
.toggle::after{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

/* ── SETTINGS MODAL ── */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.sr-label{font-size:13.5px;font-weight:500}
.sr-sub{font-size:11.5px;color:var(--txt2);margin-top:2px}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:600;cursor:zoom-out;backdrop-filter:blur(6px);animation:fadeIn .2s ease}
.lightbox img{max-width:92vw;max-height:90vh;object-fit:contain;border-radius:8px;cursor:default}
.lb-close{position:absolute;top:18px;right:18px;width:38px;height:38px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lb-close:hover{background:rgba(255,255,255,.2)}

/* ── TOASTS ── */
.toast-cont{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:7px;z-index:800;pointer-events:none}
.toast{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:9px;min-width:260px;max-width:340px;box-shadow:var(--shadow);animation:toastIn .3s ease;pointer-events:all}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.toast-out{animation:toastOut .3s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(16px)}}
.ti{font-size:19px;flex-shrink:0}
.tt{flex:1}
.tt-title{font-weight:600;font-size:13px}
.tt-body{font-size:12px;color:var(--txt2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}

/* ── MY PROFILE PANEL ── */
.my-profile-panel{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.mpp-card{background:var(--bg1);border:1px solid var(--border);border-radius:22px;padding:28px;width:400px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:slideUp .2s ease-out;max-height:90vh;overflow-y:auto}
.mpp-av{width:72px;height:72px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,var(--acc),var(--grn));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;overflow:hidden;cursor:pointer;position:relative}
.mpp-av img{width:100%;height:100%;object-fit:cover}
.mpp-av-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0;transition:opacity .2s;border-radius:50%}
.mpp-av:hover .mpp-av-overlay{opacity:1}
.mpp-name{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px}
.mpp-email{text-align:center;color:var(--txt2);font-size:13px;margin-bottom:4px}
.mpp-phone{text-align:center;color:var(--txt3);font-size:12px;font-family:'JetBrains Mono',monospace;margin-bottom:18px}
.mpp-tabs{display:flex;background:var(--bg2);border-radius:11px;padding:4px;gap:3px;margin-bottom:18px}
.mpp-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--txt2);cursor:pointer;border-radius:8px;font-family:'Sora',sans-serif;font-size:12.5px;font-weight:500;transition:all .2s}
.mpp-tab.on{background:var(--bg4);color:var(--txt1)}

/* ── SEARCH IN CHAT ── */
.search-in-chat{padding:10px 14px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sic-input{flex:1;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt1);font-family:'Sora',sans-serif;font-size:13.5px;outline:none}
.sic-input:focus{border-color:var(--acc)}
.highlight{background:rgba(93,106,240,.3);border-radius:2px}

/* ── PAYWALL ── */
.paywall-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:900;backdrop-filter:blur(8px);animation:fadeIn .2s ease;padding:16px}
.paywall-card{background:var(--bg1);border:1px solid var(--border);border-radius:24px;padding:36px 28px;width:100%;max-width:380px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.6);animation:slideUp .25s ease-out}
.paywall-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--grn));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 18px}
.paywall-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:8px}
.paywall-sub{color:var(--txt2);font-size:14px;line-height:1.6;margin-bottom:24px}
.paywall-price{font-size:42px;font-weight:700;color:var(--acc);letter-spacing:-1px;margin-bottom:4px}
.paywall-price span{font-size:18px;font-weight:500;color:var(--txt2)}
.paywall-once{font-size:12.5px;color:var(--txt3);margin-bottom:24px}
.paywall-features{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;text-align:left}
.paywall-feature{display:flex;align-items:center;gap:10px;font-size:13.5px}
.paywall-feature-icon{width:26px;height:26px;border-radius:8px;background:var(--grn-dim);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.paywall-pay-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--acc),#7b6ef5);border:none;border-radius:13px;color:#fff;font-family:'Sora',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:0 6px 20px rgba(93,106,240,.4);margin-bottom:10px}
.paywall-pay-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(93,106,240,.55)}
.paywall-pay-btn:active{transform:none}
.paywall-pay-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.paywall-cancel{background:none;border:none;color:var(--txt3);font-family:'Sora',sans-serif;font-size:13px;cursor:pointer;padding:6px;transition:color .15s}
.paywall-cancel:hover{color:var(--txt1)}
.paywall-secure{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11.5px;color:var(--txt3);margin-top:14px}

@media(max-width:700px){

  html,body{overflow-x:hidden;width:100%;max-width:100vw}

  /* ── App shell: full-screen panels ── */
  #app{position:fixed;inset:0;overflow:hidden}

  /* ── Sidebar: full screen, slides in/out ── */
  .sidebar{
    width:100%;min-width:0;flex-shrink:0;
    position:fixed;inset:0;z-index:100;
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    overflow-x:hidden;
  }
  .sidebar.mob-hidden{transform:translateX(-100%);pointer-events:none}

  /* ── Main: full screen, slides in from right ── */
  .main{
    position:fixed;inset:0;z-index:50;
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    overflow:hidden;width:100%;

  .msgs-area{padding:12px 10px}

  .profile-panel{position:fixed;inset:0;z-index:200;width:100%;max-width:100%}

  .overlay{align-items:flex-end!important;padding:0}

// ── PERSISTENCE ──
function _storageKey(phone){ return 'nx_' + (phone||'').replace(/\D/g,''); }
function _saveState(){
  if(!STATE.me)return;
  try{
    const d={me:STATE.me,users:STATE.users,rooms:STATE.rooms,messages:STATE.messages,settings:STATE.settings,privacy:STATE.privacy};
    localStorage.setItem(_storageKey(STATE.me.phone), JSON.stringify(d));
  }catch(e){}
}
function _loadState(phone){
  try{
    const raw=localStorage.getItem(_storageKey(phone));
    if(!raw)return null;
    const d=JSON.parse(raw);
    Object.values(d.messages||{}).forEach(msgs=>msgs.forEach(m=>m.createdAt=new Date(m.createdAt)));
    Object.values(d.rooms||{}).forEach(r=>{ if(r.lastMessage?.timestamp)r.lastMessage.timestamp=new Date(r.lastMessage.timestamp); });
    return d;
  }catch(e){return null;}
}

function getPhoneRegion(phone){
  const digits = phone.replace(/\D/g,'');
  for(const len of [3,2,1]){
    const prefix = digits.slice(0,len);
    const match = PHONE_REGIONS.find(r=>r.code===prefix);
    if(match) return match;
  }
  return {code:'1',flag:'🇺🇸',region:'United States / Canada'};
}

function maskPhone(phone){
  const digits = phone.replace(/\D/g,'');
  if(digits.length<=4) return phone;
  return '•••••' + digits.slice(-4);
}

function formatPhoneInput(inp){
  // Remove non-digits except spaces/dashes
  let v = inp.value.replace(/[^\d\s\-]/g,'');
  inp.value = v;
}

// Detect region from browser locale
function detectRegion(){
  try{
    const locale = navigator.language || 'en-US';
    const country = locale.split('-')[1]||'US';
    const map = {US:'1',GB:'44',AU:'61',DE:'49',FR:'33',ES:'34',IT:'39',JP:'81',CN:'86',IN:'91',BR:'55',CA:'1',NL:'31',SE:'46',NO:'47',DK:'45',FI:'58',PL:'48',UA:'380',RU:'7',TR:'90',SA:'966',AE:'971',NG:'234',ZA:'27',KE:'254',MX:'52',AR:'54',CO:'57',SG:'65',MY:'60',ID:'62',PH:'63',TH:'66',VN:'84',KR:'82',PK:'92',BD:'880',IE:'353',PT:'351',CH:'41',AT:'43',BE:'32',CZ:'420',GR:'30',HU:'36',RO:'40',BG:'359',HR:'385',SK:'421',SI:'386',NZ:'64',ZA:'27'};
    const code = map[country.toUpperCase()]||'1';
    return PHONE_REGIONS.find(r=>r.code===code) || PHONE_REGIONS[0];
  }catch(e){ return PHONE_REGIONS[0]; }
}

}

function validateField(id, type){
  const el = document.getElementById(id);
  const hint = document.getElementById(id+'-hint');
  if(!el||!hint)return false;
  const v = el.value.trim();
  if(type==='name'){
    if(v.length<2){hint.textContent='Name must be at least 2 characters';hint.className='fi-hint err';el.className='fi invalid';return false;}
    hint.textContent='✓ Looks good!';hint.className='fi-hint ok';el.className='fi valid';return true;
  }
  return true;
}
function validateUsername(el){
  const v = el.value.trim();
  const hint = document.getElementById('reg-username-hint');
  const clean = v.replace('@','');
  if(clean.length<3){hint.textContent='Username must be at least 3 characters';hint.className='fi-hint err';el.className='fi invalid';return;}
  if(!/^[a-zA-Z0-9_]+$/.test(clean)){hint.textContent='Only letters, numbers, underscores';hint.className='fi-hint err';el.className='fi invalid';return;}
  hint.textContent='✓ @'+clean+' available';hint.className='fi-hint ok';el.className='fi valid';
}
function validatePassword(el){
  const v = el.value;
  const hint = document.getElementById('pass-reg-hint');
  if(v.length<6){hint.textContent='At least 6 characters required';hint.className='fi-hint err';el.className='fi invalid';return;}
  const strength = v.length>=10&&/[A-Z]/.test(v)&&/[0-9]/.test(v)?'Strong 💪':v.length>=8?'Good 👍':'Fair';
  hint.textContent='Password strength: '+strength;hint.className='fi-hint ok';el.className='fi valid';
}

async function handleLogin(){
  hideAuthErr('auth-err');
  const countryCode = selectedCountryLogin.code;
  const phoneRaw = (document.getElementById('phone-login')?.value||'').replace(/\D/g,'');
  const pass = (document.getElementById('pass-login')?.value||'');
  if(!phoneRaw||phoneRaw.length<6) return showAuthErr('auth-err','Please enter a valid phone number');
  if(!pass) return showAuthErr('auth-err','Please enter your password');
  const phone = countryCode + phoneRaw;

  // Try local cache first (works offline, instant)
  const saved = _loadState(phone);
  if(saved?.me){ doLogin(saved.me, false, saved); return; }

  // Not found locally — check Supabase (cross-device)
  const btn = document.querySelector('#auth-login .auth-btn');
  if(btn){ btn.disabled=true; btn.textContent='Signing in...'; }
  try {
    const hash = await _hashPass(pass);
    const {data,error} = await _SB.from('nx_users').select('*').eq('phone',phone).eq('password_hash',hash).maybeSingle();
    if(btn){ btn.disabled=false; btn.textContent='Sign In →'; }
    if(!data){ showAuthErr('auth-err','No account found. Please sign up first.'); return; }
    const user = {id:data.id,username:data.username,handle:data.handle,phone:data.phone,
      status:data.status,avatar:data.avatar,isOnline:true,
      createdAt:data.created_at,inviteCode:data.invite_code||''};
    STATE.me=user; STATE.users={[user.id]:user,'me':user};
    STATE.hasPaid = data.has_paid === true;
    STATE.rooms={}; STATE.messages={};
    STATE.settings={notifications:true,readReceipts:true,sounds:true};
    STATE.privacy={findByPhone:'everyone',findByUsername:'everyone',whoCanMessage:'everyone',showOnline:true,showPhone:true};
    _saveState();
    doLogin(user, false, null);
  } catch(e) {
    if(btn){ btn.disabled=false; btn.textContent='Sign In →'; }
    showAuthErr('auth-err','Connection error. Please check your internet.');
    console.error('Login error:',e);
  }
}

async function handleRegister(){
  hideAuthErr('auth-err-reg');
  const name = (document.getElementById('reg-name')?.value||'').trim();
  const usernameRaw = (document.getElementById('reg-username')?.value||'').trim().replace('@','');
  const countryCode = selectedCountryReg.code;
  const phoneRaw = (document.getElementById('phone-reg')?.value||'').replace(/\D/g,'');
  const pass = (document.getElementById('pass-reg')?.value||'');
  if(!name||name.length<2) return showAuthErr('auth-err-reg','Display name is required');
  if(!usernameRaw||usernameRaw.length<3) return showAuthErr('auth-err-reg','Username must be at least 3 characters');
  if(!/^[a-zA-Z0-9_]+$/.test(usernameRaw)) return showAuthErr('auth-err-reg','Username: only letters, numbers, underscores');
  if(!phoneRaw||phoneRaw.length<6) return showAuthErr('auth-err-reg','Please enter a valid phone number');
  if(!pass||pass.length<6) return showAuthErr('auth-err-reg','Password must be at least 6 characters');
  const phone = countryCode + phoneRaw;

  const btn = document.querySelector('#auth-register .auth-btn');
  if(btn){ btn.disabled=true; btn.textContent='Creating account...'; }
  try {
    const hash = await _hashPass(pass);
    const userId = 'u'+Date.now()+Math.random().toString(36).slice(2,6);
    const inviteCode = 'nxc_'+Math.random().toString(36).slice(2,10);

    // Insert into Supabase so EVERY device can discover this user
    const {error} = await _SB.from('nx_users').insert({
      id: userId,
      username: name,
      handle: '@'+usernameRaw.toLowerCase(),
      phone: phone,
      password_hash: hash,
      status: 'Hey there! I am using NexusChat.',
      is_online: true,
      invite_code: inviteCode
    });

    if(btn){ btn.disabled=false; btn.textContent='Create Account →'; }
    if(error){
      if(error.message?.includes('handle')||error.code==='23505'&&error.message?.includes('handle'))
        return showAuthErr('auth-err-reg','Username already taken. Try another.');
      if(error.message?.includes('phone')||error.code==='23505'&&error.message?.includes('phone'))
        return showAuthErr('auth-err-reg','This number is already registered. Sign in instead.');
      return showAuthErr('auth-err-reg','Error: '+error.message);
    }

    const user = {id:userId,username:name,handle:'@'+usernameRaw.toLowerCase(),phone,
      status:'Hey there! I am using NexusChat.',avatar:null,
      isOnline:true,createdAt:new Date().toISOString(),inviteCode};
    STATE.me=user; STATE.users={[userId]:user,'me':user};
    STATE.rooms={}; STATE.messages={};
    STATE.settings={notifications:true,readReceipts:true,sounds:true};
    STATE.privacy={findByPhone:'everyone',findByUsername:'everyone',whoCanMessage:'everyone',showOnline:true,showPhone:true};
    _saveState();
    doLogin(user, true);
  } catch(e) {
    if(btn){ btn.disabled=false; btn.textContent='Create Account →'; }
    showAuthErr('auth-err-reg','Connection error. Please check your internet.');
    console.error('Register error:',e);
  }
}


function doLogin(user, isNew, saved){
  STATE.me=user;
  if(!isNew&&saved){
    STATE.users=saved.users||{};
    STATE.rooms=saved.rooms||{};
    STATE.messages=saved.messages||{};
    STATE.settings=saved.settings||STATE.settings;
    STATE.privacy={showPhone:true,...(saved.privacy||STATE.privacy)}; if(STATE.me?.phonePrivate)STATE.privacy.showPhone=false;
    // Ensure me is in users
    STATE.users['me']=user;
  }

  document.getElementById('auth').style.opacity='0';
  document.getElementById('auth').style.pointerEvents='none';
  setTimeout(()=>{ document.getElementById('auth').style.display='none'; },400);
  document.getElementById('app').classList.add('visible');
  document.documentElement.setAttribute('data-theme',STATE.theme);
  document.getElementById('theme-btn').textContent=STATE.theme==='dark'?'🌙':'☀️';
  renderSidebar();
  renderMyAvatar();
  // On mobile, start with sidebar visible and main hidden
  if(window.innerWidth<=700){
    document.getElementById('main').classList.add('mob-hidden');
    document.getElementById('sidebar').classList.remove('mob-hidden');
  }
  // Prevent body scroll bounce on iOS
  document.body.addEventListener('touchmove', e=>{
    if(e.target===document.body) e.preventDefault();
  },{passive:false});
  startSimulator();
  _loadContacts(); // load who I've added and who's added me
  toast('👋','Welcome, '+user.username+'!',isNew?'Account created successfully!':'Signed in successfully!');
}

function renderRegisteredAccounts(){
  const wrap = document.getElementById('reg-accounts-wrap');
  const list = document.getElementById('reg-accounts-list');
  if(!wrap||!list)return;
  const accounts = [];
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(!k?.startsWith('nx_'))continue;
      const d=JSON.parse(localStorage.getItem(k)||'{}');
      if(d?.me?.phone) accounts.push(d.me);
    }
  }catch(e){}
  if(!accounts.length){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  list.innerHTML = accounts.map(u=>{
    const reg = getPhoneRegion(u.phone);
    return `<div class="reg-item" onclick="quickFillAccount('${escStr(u.phone)}')">
      <div class="reg-flag">${reg.flag}</div>
      <div class="reg-info">
        <div class="reg-name">${escHtml(u.username)}</div>
        <div class="reg-region">${escHtml(reg.region)}</div>
        <div class="reg-phone">${maskPhone(u.phone)}</div>
      </div>
      <div class="reg-arrow">→</div>
    </div>`;
  }).join('');
}

function quickFillAccount(phone){
  const reg = getPhoneRegion(phone);
  const digits = phone.replace(/\D/g,'');
  const numberPart = digits.slice(reg.code.length);
  applyCountryToUI('login', reg);
  const el = document.getElementById('phone-login');
  if(el){ el.value=numberPart; }
  document.getElementById('pass-login')?.focus();
}

function initials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function fmtTime(d){ if(!d)return''; return new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(d){
  if(!d)return''; const nd=new Date(d),now=new Date();
  if(now.toDateString()===nd.toDateString())return'Today';
  const prev=new Date(now); prev.setDate(prev.getDate()-1);
  if(prev.toDateString()===nd.toDateString())return'Yesterday';
  const diff=(now-nd)/86400000;
  if(diff<7)return nd.toLocaleDateString([],{weekday:'long'});
  return nd.toLocaleDateString([],{month:'short',day:'numeric'});
}
function fmtSideTime(d){
  if(!d)return''; const nd=new Date(d),now=new Date();
  if(now.toDateString()===nd.toDateString())return fmtTime(nd);
  const diff=(now-nd)/86400000;
  if(diff<7)return nd.toLocaleDateString([],{weekday:'short'});
  return nd.toLocaleDateString([],{month:'short',day:'numeric'});
}
function fmtSize(b){ if(!b)return''; if(b<1024)return b+'B'; if(b<1048576)return(b/1024).toFixed(1)+'KB'; return(b/1048576).toFixed(1)+'MB'; }
function fmtDuration(s){ if(!s)return'0:00'; return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function escHtml(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escStr(s){ return String(s||'').replace(/'/g,"\\'"); }
function getRoom(id){ return STATE.rooms[id]; }
function getUser(id){ if(!id)return{id:'',username:'Deleted User',avatar:null,isOnline:false}; if(id==='me')return STATE.me; return STATE.users[id]||{id,username:'Deleted User',avatar:null,isOnline:false}; }
function getRoomDisplayName(room){
  if(room.type==='group')return room.name;
  const other=room.members.find(m=>m.id!=='me');
  return getUser(other?.id)?.username||'Unknown';
}
function getRoomOtherUser(room){
  if(room.type!=='direct')return null;
  const other=room.members.find(m=>m?.id!=='me'&&m?.id!==STATE.me?.id);
  return getUser(other?.id);
}
function avatarEl(user, size=44){
  if(user?.avatar) return `<img src="${escHtml(user.avatar)}" alt="${escHtml(user.username)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  const colors=['linear-gradient(135deg,#5d6af0,#7c85f5)','linear-gradient(135deg,#3ddc97,#28b87a)','linear-gradient(135deg,#f0607a,#f0a04b)','linear-gradient(135deg,#9b59f5,#5d6af0)','linear-gradient(135deg,#f0a04b,#f0607a)'];
  const hash=(user?.id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const color=colors[hash%colors.length];
  return `<div style="width:100%;height:100%;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:${Math.floor(size*.35)}px">${initials(user?.username)}</div>`;
}

function renderSidebar(){
  const q = (document.getElementById('sb-search-inp')?.value||'').toLowerCase();
  let rooms = Object.values(STATE.rooms).filter(r=>{
    if(r.archived)return false;
    if(!q)return true;
    return getRoomDisplayName(r).toLowerCase().includes(q);
  });
  rooms.sort((a,b)=>{
    if(a.pinned&&!b.pinned)return-1;
    if(!a.pinned&&b.pinned)return 1;
    return new Date(b.lastMessage?.timestamp||0)-new Date(a.lastMessage?.timestamp||0);
  });
  const cl = document.getElementById('chat-list');
  if(!cl)return;
  if(!rooms.length){ cl.innerHTML='<div class="sb-empty">No chats yet.<br><small>Use Discover to find people!</small></div>'; return; }
  cl.innerHTML = rooms.map(r=>renderChatItem(r)).join('');
}

function renderChatItem(room){
  const name=escHtml(getRoomDisplayName(room));
  const isActive=STATE.activeRoom?.id===room.id;
  const other=getRoomOtherUser(room);
  const av=other?avatarEl(other,44):avatarEl({id:room.id,username:room.name,avatar:null},44);
  let lastTxt='';
  const lm=room.lastMessage;

  const isTyping=room.typingUsers?.length>0;
  const onlineDot=other&&other.isOnline&&room.type==='direct'?`<div class="ci-dot"></div>`:'';
  return `<div class="chat-item${isActive?' act':''}" onclick="selectRoom('${room.id}')" oncontextmenu="showChatCtxMenu(event,'${room.id}')">

}

async function deleteChat(roomId){
  document.getElementById('del-chat-overlay')?.remove();
  if(STATE.activeRoom?.id===roomId){
    STATE.activeRoom=null;
    STATE.showProfile=false;
    document.getElementById('profile-panel')?.remove();
    document.getElementById('main').innerHTML=`<div class="no-chat" id="no-chat"><div class="no-chat-icon">💬</div><h2>NexusChat</h2><p>Select a conversation or discover people to chat with</p></div>`;
  }
  // Remove from Supabase so it's gone on all devices
  try {
    await _SB.from('nx_messages').delete().eq('room_id', roomId);
    await _SB.from('nx_room_members').delete().eq('room_id', roomId);
    await _SB.from('nx_rooms').delete().eq('id', roomId);
  } catch(e){ console.warn('deleteChat Supabase error:', e); }
  delete STATE.rooms[roomId];
  delete STATE.messages[roomId];
  if(typeof _lastPollAt !== 'undefined') delete _lastPollAt[roomId];
  _saveState();
  renderSidebar();
  toast('🗑️','Chat deleted','');
}

function setDiscoverFilter(f){

  document.querySelectorAll('.disc-filter').forEach(b=>{

  });
  _fetchDiscoverUsers();

async function _fetchDiscoverUsers(){
  const listEl = document.getElementById('disc-user-list');
  if(!listEl) return;
  listEl.innerHTML = '<div class="disc-no-res" style="opacity:.5">🔄 Loading...</div>';
  const q = STATE.discoverSearch;
  const filter = STATE.discoverFilter;
  try {
    let qb = _SB.from('nx_users')
      .select('id,username,handle,status,avatar,is_online')
      .neq('id', STATE.me?.id||'__none__')
      .order('username',{ascending:true})
      .limit(100);
    if(filter==='online') qb = qb.eq('is_online',true);
    if(q.trim()) qb = qb.or('username.ilike.%'+q.trim()+'%,handle.ilike.%'+q.trim()+'%');
    const {data,error} = await qb;
    const el = document.getElementById('disc-user-list');
    if(!el) return;
    if(error){ el.innerHTML='<div class="disc-no-res">⚠️ Could not load. Check internet.</div>'; return; }
    if(!data||!data.length){
      el.innerHTML = q
        ? `<div class="disc-no-res">No users found for "${escHtml(q)}"</div>`
        : '<div class="disc-no-res">No other users registered yet.<br><small>Share the app so friends can sign up!</small></div>';
      return;
    }
    const seen = new Set([STATE.me?.id]);
    const deduped = data.filter(u=>{ if(seen.has(u.id))return false; seen.add(u.id); return true; });
    deduped.forEach(u=>{ STATE.users[u.id]={...u,isOnline:u.is_online,phonePrivate:u.phone_private===true}; });
    el.innerHTML = deduped.map(u=>renderDiscUserCard({...u,isOnline:u.is_online})).join('');
  } catch(e) {
    const el = document.getElementById('disc-user-list');
    if(el) el.innerHTML='<div class="disc-no-res">⚠️ Connection error.</div>';
  }
}

function startChatWith(userId){
  // Always use deterministic stable ID — prevents duplicates
  const stableId = _directRoomKey(STATE.me?.id||'me', userId);
  if(STATE.rooms[stableId]){ selectRoom(stableId); switchSbTab('chats'); return; }
  // Also check by member in case room was created before stable IDs
  const existing = Object.values(STATE.rooms).find(r=>r.type==='direct'&&r.members.some(m=>m.id===userId));
  if(existing){ selectRoom(existing.id); switchSbTab('chats'); return; }
  const room = mkRoom(stableId,'direct',[{id:'me'},{id:userId}]);
  STATE.rooms[stableId] = room;
  STATE.messages[stableId] = [];
  renderSidebar();
  selectRoom(stableId);
  switchSbTab('chats');
  toast('💬','Chat started',`New chat with ${getUser(userId).username}`);
}

async function addContact(userId){
  const u = getUser(userId);
  if(STATE.contacts.has(userId)){
    // Already added — just open chat
    startChatWith(userId);
    return;
  }
  try {
    await _SB.from('nx_contacts').upsert({user_id: STATE.me.id, contact_id: userId});
    STATE.contacts.add(userId);
  } catch(e){ console.warn('addContact error', e); }
  startChatWith(userId);
  toast('✅','Contact added', `${u.username} added to your contacts`);
  // Refresh discover list to reflect new status
  if(STATE.sbTab==='discover') _fetchDiscoverUsers();
}

async function _loadContacts(){
  if(!STATE.me?.id) return;
  try {
    // Who I've added
    const {data:mine} = await _SB.from('nx_contacts').select('contact_id').eq('user_id', STATE.me.id);
    STATE.contacts = new Set((mine||[]).map(r=>r.contact_id));
    // Who's added me
    const {data:theirs} = await _SB.from('nx_contacts').select('user_id').eq('contact_id', STATE.me.id);
    STATE.addedMe = new Set((theirs||[]).map(r=>r.user_id));
  } catch(e){ console.warn('_loadContacts error', e); }
}

}

async function selectRoom(id){
  const room=STATE.rooms[id]; if(!room)return;
  STATE.activeRoom=room; room.unread=0;
  STATE.replyTo=null; STATE.chatSearchMode=false; STATE.chatSearch='';

    document.getElementById('sidebar').classList.add('mob-hidden');

  const stableId = await _ensureRoom(room);
  if(stableId && stableId !== id){
    // Room got a stable ID — re-select with the new ID
    if(STATE.activeRoom?.id===stableId){ renderChatArea(); }
    id = stableId;
  }
  await _loadRoomMessages(id);
  renderMessages();
  scrollBottom(false);
  _lastPollAt[id] = new Date().toISOString();
}

function renderSearchBar(){

function renderReplyBar(){

}

// ── MESSAGES ──
function renderMessages(){
  const area=document.getElementById('msgs-area'); if(!area||!STATE.activeRoom)return;
  const msgs=(STATE.messages[STATE.activeRoom.id]||[]).filter(m=>{ if(!STATE.chatSearch)return true; return m.content?.toLowerCase().includes(STATE.chatSearch.toLowerCase()); });
  if(!msgs.length){ area.innerHTML=STATE.chatSearch?'<div style="text-align:center;color:var(--txt3);padding:40px">No messages found</div>':'<div style="text-align:center;color:var(--txt3);padding:60px 20px">No messages yet. Say hello! 👋</div>'; return; }
  let html='',lastDate='',lastSender='';
  msgs.forEach((msg,i)=>{ const d=fmtDate(msg.createdAt); if(d!==lastDate){html+=`<div class="date-sep">${d}</div>`;lastDate=d;lastSender='';} const isOut=msg.senderId==='me'; const sender=getUser(msg.senderId); const consecutive=lastSender===msg.senderId&&i>0; lastSender=msg.senderId; html+=renderMsgRow(msg,isOut,consecutive,sender); });
  area.innerHTML=html;
}

function renderMsgRow(msg,isOut,consecutive,sender){
  if(msg.isDeleted) return `<div class="msg-row${isOut?' out':''}${consecutive?' consec':''}"><div class="mav">${consecutive?'':avatarEl(sender,26)}</div><div class="msg-wrap"><div class="bubble"><div class="deleted-msg">🚫 Message deleted</div><div class="msg-foot"><span class="msg-time">${fmtTime(msg.createdAt)}</span></div></div></div></div>`;
  const replyHtml=msg.replyTo?renderReplyPreview(msg.replyTo):'';
  const senderLabel=!isOut&&!consecutive&&STATE.activeRoom?.type==='group'?`<div class="msg-sender">${escHtml(sender.username)}</div>`:'';
  const contentHtml=renderMsgContent(msg,isOut);
  const reactHtml=msg.reactions?.length?renderReactions(msg):'';
  const ticks=isOut?renderTicks(msg):'';
  return `<div class="msg-row${isOut?' out':''}${consecutive?' consec':''}" id="msg-${msg.id}" oncontextmenu="showCtxMenu(event,'${msg.id}')" onmouseenter="showQuickReact('${msg.id}',${isOut})" onmouseleave="hideQuickReact()">
    <div class="mav">${consecutive?'':avatarEl(sender,26)}</div>
    <div class="msg-wrap" id="wrap-${msg.id}">
      <div class="bubble" id="bubble-${msg.id}">${senderLabel}${replyHtml}${contentHtml}<div class="msg-foot">${msg.isEdited?'<span class="edited-lbl">edited</span>':''}<span class="msg-time">${fmtTime(msg.createdAt)}</span>${ticks}</div></div>
      ${reactHtml}
    </div>
  </div>`;
}
function renderReplyPreview(rt){ const s=getUser(rt.senderId); const t=rt.type!=='text'?`📎 ${rt.type}`:escHtml((rt.content||'').slice(0,80)); return `<div class="rp-box"><div class="rp-sender">${escHtml(s.username)}</div><div class="rp-txt">${t}</div></div>`; }
function renderMsgContent(msg,isOut){
  switch(msg.type){
    case 'image': return `<img class="msg-img" src="${escHtml(msg.media?.url||'')}" alt="Image" onclick="openLightbox('${escHtml(msg.media?.url||'')}')">`;
    case 'audio': return `<div class="audio-msg"><button class="play-btn" onclick="playAudio('${msg.id}',this)" id="pb-${msg.id}">▶</button><div class="waveform">${Array.from({length:24},(_,i)=>`<div class="wb" style="height:${20+Math.random()*60}%;animation-delay:${i*.06}s"></div>`).join('')}</div><span class="audio-dur">${fmtDuration(msg.media?.duration)}</span><audio id="aud-${msg.id}" style="display:none" src="${msg.media?.blobUrl||''}" onended="audioEnded('${msg.id}')"></audio></div>`;
    case 'video': return `<video controls style="max-width:260px;border-radius:12px;display:block" src="${escHtml(msg.media?.url||'')}"></video>`;
    case 'document': return `<div class="msg-doc"><div class="doc-icon">${getDocIcon(msg.media?.mimeType)}</div><div class="doc-info"><div class="doc-name">${escHtml(msg.media?.name||'Document')}</div><div class="doc-size">${fmtSize(msg.media?.size)}</div></div></div>`;
    default: return `<div class="msg-txt">${escHtml(msg.content||'')}</div>`;
  }
}
function getDocIcon(m){ if(!m)return'📄'; if(m.includes('pdf'))return'📕'; if(m.includes('word'))return'📘'; if(m.includes('sheet'))return'📗'; return'📄'; }
function renderReactions(msg){ return `<div class="reactions" id="react-${msg.id}">${msg.reactions.map(r=>`<div class="rpill${r.userIds.includes('me')?' mine':''}" onclick="toggleReaction('${msg.id}','${r.emoji}')">${r.emoji}<span class="rc">${r.userIds.length}</span></div>`).join('')}</div>`; }
function renderTicks(msg){ const isRead=msg.readBy?.some(id=>id!=='me'); const isDelivered=msg.deliveredTo?.length>0; return `<span class="${isRead?'ticks read':'ticks'}" title="${isRead?'Read':isDelivered?'Delivered':'Sent'}">${isRead?'✓✓':isDelivered?'✓✓':'✓'}</span>`; }

function scrollBottom(smooth=false){ const a=document.getElementById('msgs-area'); if(!a)return; a.scrollTo({top:a.scrollHeight,behavior:smooth?'smooth':'instant'}); STATE.atBottom=true; STATE.newUnread=0; const b=document.getElementById('scroll-to-bottom'); if(b)b.classList.remove('show'); const bd=document.getElementById('stb-badge'); if(bd)bd.style.display='none'; }
function scrollToLatest(){ scrollBottom(true); }
function _initScrollWatcher(){ const a=document.getElementById('msgs-area'); if(!a)return; a.addEventListener('scroll',()=>{ const d=a.scrollHeight-a.scrollTop-a.clientHeight; STATE.atBottom=d<80; const b=document.getElementById('scroll-to-bottom'); if(b)b.classList.toggle('show',!STATE.atBottom); if(STATE.atBottom){STATE.newUnread=0;const bd=document.getElementById('stb-badge');if(bd)bd.style.display='none';} }); }

// ── INPUT/SEND ──
function handleInputKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function handleInputChange(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,150)+'px'; }
async function sendMessage(){
  if(!STATE.hasPaid){ showPaywall(); return; }
  const inp=document.getElementById('msg-input'); const text=inp?.value.trim();
  if(!text||!STATE.activeRoom)return;
  const roomId = await _ensureRoom(STATE.activeRoom);
  if(!roomId) return;
  const msgId = uid();
  const now = new Date();
  const msg={id:msgId,roomId:STATE.activeRoom.id,senderId:'me',type:'text',content:text,createdAt:now,readBy:[],deliveredTo:[],reactions:[],replyTo:STATE.replyTo?{...STATE.replyTo}:null,isDeleted:false,isEdited:false,editHistory:[]};
  // Optimistic UI — show immediately
  addMessageLocal(msg);
  if(inp){inp.value='';inp.style.height='auto';}
  clearReply();
  if(STATE.showEmojiPicker){STATE.showEmojiPicker=false;rerenderInput();}
  // Persist to Supabase
  try {
    await _SB.from('nx_messages').insert({
      id: msgId,
      room_id: roomId,
      sender_id: STATE.me.id,
      type: 'text',
      content: text,
      reply_to_id: STATE.replyTo?.id||null
    });
  } catch(e){ console.warn('Message save failed:', e); }
}
// addMessage kept for file upload / forward / voice (non-text) — also writes to Supabase
async function addMessage(msg){
  const roomId = await _ensureRoom(STATE.activeRoom || STATE.rooms[msg.roomId]);
  addMessageLocal(msg);
  if(roomId && msg.type === 'text') {
    try {
      await _SB.from('nx_messages').insert({
        id: msg.id, room_id: roomId, sender_id: STATE.me.id,
        type: msg.type, content: msg.content, reply_to_id: msg.replyTo?.id||null
      });
    } catch(e){ console.warn('addMessage Supabase error:', e); }
  }
}
function addMessageLocal(msg){
  if(!STATE.messages[msg.roomId])STATE.messages[msg.roomId]=[];
  // Deduplicate — don't add if ID already exists (realtime may deliver before poll)
  if(STATE.messages[msg.roomId].find(m=>m.id===msg.id)) return;
  STATE.messages[msg.roomId].push(msg); _saveState();
  if(STATE.rooms[msg.roomId]) STATE.rooms[msg.roomId].lastMessage={content:msg.type==='text'?msg.content:`📎 ${msg.type}`,timestamp:msg.createdAt,type:msg.type,senderId:msg.senderId};
  renderSidebar();
  if(STATE.activeRoom?.id===msg.roomId){
    appendMessageEl(msg);
    if(STATE.atBottom) scrollBottom(false);
    else if(msg.senderId!=='me'){ STATE.newUnread++; const b=document.getElementById('scroll-to-bottom'); if(b)b.classList.add('show'); const bd=document.getElementById('stb-badge'); if(bd){bd.style.display='block';bd.textContent=STATE.newUnread>9?'9+':STATE.newUnread;} }
  } else if(msg.senderId!=='me'){
    STATE.rooms[msg.roomId].unread=(STATE.rooms[msg.roomId].unread||0)+1; renderSidebar();
    const sender=getUser(msg.senderId); const roomName=getRoomDisplayName(STATE.rooms[msg.roomId]||{});
    if(STATE.settings.notifications) toast('💬',`${sender.username}`,msg.type==='text'?msg.content:`📎 ${msg.type}`);
  }
}
function appendMessageEl(msg){
  const area=document.getElementById('msgs-area'); if(!area)return;
  const empty=area.querySelector('div[style*="No messages"]'); if(empty)empty.remove();
  const msgs=STATE.messages[STATE.activeRoom.id]; const i=msgs.indexOf(msg); const prev=msgs[i-1]; const consecutive=prev&&prev.senderId===msg.senderId; const sender=getUser(msg.senderId); const isOut=msg.senderId==='me';
  if(!prev||fmtDate(msg.createdAt)!==fmtDate(prev.createdAt)){ const sep=document.createElement('div'); sep.className='date-sep'; sep.textContent=fmtDate(msg.createdAt); area.appendChild(sep); }
  const div=document.createElement('div'); div.innerHTML=renderMsgRow(msg,isOut,consecutive,sender); area.appendChild(div.firstElementChild);
}
function updateMessageEl(msg){
  if(STATE.activeRoom?.id!==msg.roomId)return;
  const el=document.getElementById(`bubble-${msg.id}`); if(!el)return;
  const foot=el.querySelector('.msg-foot'); if(!foot)return;
  foot.innerHTML=`${msg.isEdited?'<span class="edited-lbl">edited</span>':''}<span class="msg-time">${fmtTime(msg.createdAt)}</span>${renderTicks(msg)}`;
}
function rerenderInput(){ const w=document.getElementById('input-wrap'); if(w)w.innerHTML=renderInputArea(); document.getElementById('msg-input')?.focus(); }

function replyToMessage(msgId){ const m=(STATE.messages[STATE.activeRoom?.id]||[]).find(m=>m.id===msgId); if(!m)return; STATE.replyTo=m; rerenderInput(); document.getElementById('msg-input')?.focus(); }
function clearReply(){ STATE.replyTo=null; rerenderInput(); }

function editMessage(msgId){
  const msgs=STATE.messages[STATE.activeRoom?.id]||[]; const msg=msgs.find(m=>m.id===msgId); if(!msg||msg.senderId!=='me')return;
  const nc=prompt('Edit message:',msg.content); if(nc===null||nc===msg.content)return;
  msg.editHistory.push({content:msg.content,at:new Date()}); msg.content=nc; msg.isEdited=true;
  const bubble=document.getElementById(`bubble-${msg.id}`);
  if(bubble){ const w=bubble.parentElement; w.innerHTML=`<div class="bubble" id="bubble-${msg.id}">${renderMsgContent(msg,true)}<div class="msg-foot"><span class="edited-lbl">edited</span><span class="msg-time">${fmtTime(msg.createdAt)}</span>${renderTicks(msg)}</div></div>${msg.reactions?.length?renderReactions(msg):''}`;  }
  renderSidebar();
}
function deleteMessage(msgId){
  if(!confirm('Delete this message?'))return;
  const msgs=STATE.messages[STATE.activeRoom?.id]||[]; const msg=msgs.find(m=>m.id===msgId); if(!msg)return;
  msg.isDeleted=true; msg.content=null; msg.media=null;
  const bubble=document.getElementById(`bubble-${msg.id}`);
  if(bubble){ bubble.innerHTML=`<div class="deleted-msg">🚫 Message deleted</div><div class="msg-foot"><span class="msg-time">${fmtTime(msg.createdAt)}</span></div>`; }
  document.getElementById(`react-${msg.id}`)?.remove();
  renderSidebar();
}
function toggleReaction(msgId,emoji){
  const msgs=STATE.messages[STATE.activeRoom?.id]||[]; const msg=msgs.find(m=>m.id===msgId); if(!msg)return;
  if(!msg.reactions)msg.reactions=[];
  const ex=msg.reactions.find(r=>r.emoji===emoji);
  if(ex){ const i=ex.userIds.indexOf('me'); if(i>-1){ex.userIds.splice(i,1);if(!ex.userIds.length)msg.reactions=msg.reactions.filter(r=>r.emoji!==emoji);}else{ex.userIds.push('me');} }
  else msg.reactions.push({emoji,userIds:['me']});
  const re=document.getElementById(`react-${msgId}`); const w=document.getElementById(`wrap-${msgId}`); if(!w)return;
  if(re)re.remove(); if(msg.reactions.length)w.insertAdjacentHTML('beforeend',renderReactions(msg));
}

let qrTimeout;
function showQuickReact(msgId,isOut){
  clearTimeout(qrTimeout); document.getElementById('qr-bar')?.remove();
  const msg=(STATE.messages[STATE.activeRoom?.id]||[]).find(m=>m.id===msgId); if(!msg||msg.isDeleted)return;
  const wrap=document.getElementById(`wrap-${msgId}`); if(!wrap)return;
  const bar=document.createElement('div'); bar.className='qr-bar '+(isOut?'out':'in'); bar.id='qr-bar';
  bar.innerHTML=QUICK_EMOJIS.map(e=>`<button class="qr-btn" onclick="toggleReaction('${msgId}','${e}');event.stopPropagation()">${e}</button>`).join('');
  bar.addEventListener('mouseenter',()=>clearTimeout(qrTimeout));
  bar.addEventListener('mouseleave',()=>{ qrTimeout=setTimeout(()=>bar.remove(),180); });
  wrap.style.position='relative'; wrap.appendChild(bar);
}
function hideQuickReact(){ qrTimeout=setTimeout(()=>{ document.getElementById('qr-bar')?.remove(); },180); }

function showCtxMenu(e,msgId){
  e.preventDefault(); closeCtxMenu();
  const msgs=STATE.messages[STATE.activeRoom?.id]||[]; const msg=msgs.find(m=>m.id===msgId); if(!msg)return;
  const isOwn=msg.senderId==='me'; const x=Math.min(e.clientX,window.innerWidth-165); const y=Math.min(e.clientY,window.innerHeight-260);
  const menu=document.createElement('div'); menu.className='ctx-menu'; menu.id='ctx-menu';

  menu.innerHTML=`<div class="ctx-item" onclick="replyToMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">↩️</span>Reply</div><div class="ctx-item" onclick="forwardMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">➡️</span>Forward</div>${!msg.isDeleted?`<div class="ctx-item" onclick="copyMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">📋</span>Copy</div>`:''}${isOwn&&!msg.isDeleted?`<div class="ctx-div"></div><div class="ctx-item" onclick="editMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">✏️</span>Edit</div>`:''}${isOwn?`<div class="ctx-div"></div><div class="ctx-item danger" onclick="deleteMessage('${msgId}');closeCtxMenu()"><span class="ctx-icon">🗑️</span>Delete</div>`:''}`;
  document.body.appendChild(menu);
  STATE.contextMenu=menu;
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true}),50);
}
function closeCtxMenu(){ STATE.contextMenu?.remove(); STATE.contextMenu=null; }
function copyMessage(msgId){ const m=(STATE.messages[STATE.activeRoom?.id]||[]).find(m=>m.id===msgId); if(m?.content)navigator.clipboard?.writeText(m.content).then(()=>toast('📋','Copied','')); }
function forwardMessage(msgId){
  const msgs=STATE.messages[STATE.activeRoom?.id]||[]; const orig=msgs.find(m=>m.id===msgId); if(!orig)return;
  const rooms=Object.values(STATE.rooms).filter(r=>r.id!==STATE.activeRoom?.id);
  const overlay=document.createElement('div'); overlay.className='overlay'; overlay.id='fwd-overlay';
  overlay.onclick=e=>{ if(e.target===overlay)overlay.remove(); };
  overlay.innerHTML=`<div class="modal"><div class="modal-head"><span class="modal-title">Forward to...</span><button class="modal-close" onclick="document.getElementById('fwd-overlay').remove()">✕</button></div><div style="max-height:300px;overflow-y:auto">${rooms.map(r=>`<div class="user-res" onclick="doForward('${r.id}','${msgId}')"><div class="ur-av">${initials(getRoomDisplayName(r))}</div><div class="ur-info"><div class="ur-name">${escHtml(getRoomDisplayName(r))}</div></div></div>`).join('')}</div></div>`;
  document.body.appendChild(overlay);
}
function doForward(roomId,msgId){
  document.getElementById('fwd-overlay')?.remove();
  const orig=(STATE.messages[STATE.activeRoom?.id]||[]).find(m=>m.id===msgId); if(!orig)return;
  addMessage({id:uid(),roomId,senderId:'me',type:orig.type,content:orig.content,media:orig.media,createdAt:new Date(),readBy:[],deliveredTo:[],reactions:[],replyTo:null,isDeleted:false,isEdited:false,editHistory:[],forwarded:true});
  toast('➡️','Forwarded',`Message forwarded to ${getRoomDisplayName(STATE.rooms[roomId])}`);
}

// ── EMOJI ──
function toggleEmoji(){ STATE.showEmojiPicker=!STATE.showEmojiPicker; rerenderInput(); if(STATE.showEmojiPicker){setTimeout(()=>{document.getElementById('ep-search')?.focus();document.addEventListener('click',closeEmojiOutside,{once:true});},50);} }
function closeEmojiOutside(e){ const p=document.getElementById('emoji-picker'); if(p&&!p.contains(e.target)){STATE.showEmojiPicker=false;rerenderInput();} }
function insertEmoji(e){ const i=document.getElementById('msg-input'); if(i){i.value+=e;i.focus();} }
