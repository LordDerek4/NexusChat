// ── FILES ──
function triggerFileUpload(){ document.getElementById('file-input')?.click(); }
function handleFileUpload(event){
  const file=event.target.files?.[0]; if(!file||!STATE.activeRoom)return;

function ncSearchUsers(q){ ncSearch=q; ncRenderResults(q); }
// Map of userId -> user object for safe click handling (avoids JSON-in-HTML-attribute issues)
const _ncUserMap = {};
async function ncRenderResults(q){
  const res=document.getElementById('nc-results'); if(!res)return;
  res.innerHTML='<div class="no-res" style="opacity:.5">🔍 Searching...</div>';

  // Fetch from Supabase for live results
  let sbUsers = [];
  try {
    let qb = _SB.from('nx_users')
      .select('id,username,handle,status,avatar,is_online')
      .neq('id', STATE.me?.id||'__none__')
      .order('username',{ascending:true})
      .limit(100);
    if(q?.trim()) qb = qb.or('username.ilike.%'+q.trim()+'%,handle.ilike.%'+q.trim()+'%');
    const {data} = await qb;
    if(data) sbUsers = data.map(u=>({...u,isOnline:u.is_online,phonePrivate:u.phone_private===true}));
  } catch(e){}

  // Supabase is the sole source of truth — only show users that exist in DB right now.
  // This ensures deleted users never appear in the list.
  const seen = new Set([STATE.me?.id]);
  const users = [];
  sbUsers.forEach(u=>{
    if(!seen.has(u.id)){ seen.add(u.id); users.push(u); STATE.users[u.id]=u; }
  });
  // Remove any locally-cached users that are no longer in Supabase results
  // (only when query is blank — otherwise the filter may hide non-matching valid users)
  if(!q?.trim()){
    Object.keys(STATE.users).forEach(id=>{
      if(id!=='me' && !seen.has(id)) delete STATE.users[id];
    });
  }
  users.sort((a,b)=>(a.username||'').localeCompare(b.username||''));

  // Cache in map so onclick can look up by ID (avoids JSON-in-attribute fragility)
  users.forEach(u=>{ _ncUserMap[u.id]=u; });

  if(!res||!document.getElementById('nc-results')) return;
  if(!users.length){
    res.innerHTML=`<div class="no-res">${q?`No users found for "${escHtml(q)}"`:'No other users yet — invite friends to join!'}</div>`;
    return;
  }
  res.innerHTML=users.map(u=>{
    const sel=ncSelected.find(s=>s.id===u.id);
    const iAdded=STATE.contacts.has(u.id), theyAdded=STATE.addedMe.has(u.id);
    const badge = iAdded&&theyAdded ? `<span style="font-size:10.5px;color:var(--acc);font-weight:600">✓ Friends</span>`
      : iAdded ? `<span style="font-size:10.5px;color:var(--txt3)">Added</span>`
      : theyAdded ? `<span style="font-size:10.5px;color:var(--grn);font-weight:600">Added you</span>`
      : '';
    return`<div class="user-res" data-uid="${escHtml(u.id)}" onclick="ncToggleUser('${escHtml(u.id)}')"><div class="ur-av">${avatarEl(u,38)}</div><div class="ur-info"><div class="ur-name">${escHtml(u.username)}${badge?` <span style="margin-left:5px">${badge}</span>`:''}</div><div class="ur-stat" style="color:var(--acc);font-size:11.5px">${escHtml(u.handle||'')}${u.isOnline?'<span style="color:var(--grn);margin-left:6px">● Online</span>':''}</div></div>${ncTab==='group'?`<div class="chk${sel?' on':''}">${sel?'✓':''}</div>`:''}</div>`;
  }).join('');
}
function ncToggleUser(userId){
  const u = _ncUserMap[userId] || STATE.users[userId];
  if(!u) return;
  // Ensure user is in local cache so getUser() works later
  STATE.users[u.id] = u;
  if(ncTab==='direct'){ncSelected=[u];ncRenderTags();ncUpdateBtn();setTimeout(createNewRoom,100);return;}
  const i=ncSelected.findIndex(s=>s.id===u.id); if(i>-1)ncSelected.splice(i,1); else ncSelected.push(u);
  ncRenderTags(); ncUpdateBtn();
  // Update checkboxes in place without re-fetching
  document.querySelectorAll('#nc-results .user-res').forEach(row=>{
    const rid=row.getAttribute('data-uid');
    const sel=ncSelected.find(s=>s.id===rid);
    const chk=row.querySelector('.chk');
    if(chk){chk.classList.toggle('on',!!sel);chk.textContent=sel?'✓':'';}
  });
}
function ncRenderTags(){ const el=document.getElementById('nc-sel-tags'); if(!el)return; el.innerHTML=ncSelected.map(u=>`<div class="sel-tag" onclick="ncToggleUser('${escHtml(u.id)}')">${escHtml(u.username)} ✕</div>`).join(''); }
function ncUpdateBtn(){ const btn=document.getElementById('nc-create-btn'); if(!btn)return; const gname=document.getElementById('nc-group-name')?.value?.trim(); const ok=ncTab==='direct'?ncSelected.length===1:ncSelected.length>0&&gname; btn.disabled=!ok; btn.textContent=ncTab==='direct'&&ncSelected.length===1?`Chat with ${ncSelected[0].username}`:`Create Group`; }
document.addEventListener('input',e=>{ if(e.target.id==='nc-group-name')ncUpdateBtn(); });
function createNewRoom(){
  if(ncTab==='direct'){
    if(!ncSelected.length)return;
    const u=ncSelected[0];
    const stableId=_directRoomKey(STATE.me?.id||'me', u.id);
    if(STATE.rooms[stableId]){document.getElementById('nc-overlay')?.remove();selectRoom(stableId);return;}
    const ex=Object.values(STATE.rooms).find(r=>r.type==='direct'&&r.members.some(m=>m.id===u.id));
    if(ex){document.getElementById('nc-overlay')?.remove();selectRoom(ex.id);return;}
    const room=mkRoom(stableId,'direct',[{id:'me'},{id:u.id}]); STATE.rooms[stableId]=room; STATE.messages[stableId]=[];
    document.getElementById('nc-overlay')?.remove(); renderSidebar(); selectRoom(stableId);
  } else {
    const gname=document.getElementById('nc-group-name')?.value?.trim(); if(!gname||!ncSelected.length)return;
    const members=[{id:'me'},...ncSelected.map(u=>({id:u.id}))];
    const room=mkRoom(uid(),'group',members); room.name=gname; STATE.rooms[room.id]=room; STATE.messages[room.id]=[];
    const sm={id:uid(),roomId:room.id,senderId:'me',type:'text',content:`${STATE.me.username} created "${gname}"`,createdAt:new Date(),readBy:[],deliveredTo:[],reactions:[],replyTo:null,isDeleted:false,isEdited:false,editHistory:[]};
    STATE.messages[room.id].push(sm); room.lastMessage={content:sm.content,timestamp:sm.createdAt,type:'text',senderId:'me'};
    document.getElementById('nc-overlay')?.remove(); renderSidebar(); selectRoom(room.id);
    toast('👥','Group created',`"${gname}" with ${members.length} members`);
  }
}

async function deleteAccount(){
  const btn = document.getElementById('del-confirm-btn');
  if(btn){ btn.disabled=true; btn.textContent='Deleting...'; }

  const userId = STATE.me?.id;
  const phone  = STATE.me?.phone;

  // ── Stop all background activity immediately ──
  _stopPolling();
  if(_callState) _endCallCleanup(null);

  // ── 1. Delete from Supabase in correct dependency order ──
  // The cascade FKs handle most of this automatically when nx_users row is deleted,
  // but we delete children first to be safe across any FK config.
  try {
    await _SB.from('nx_calls').delete().or(`caller_id.eq.${userId},callee_id.eq.${userId}`);
    await _SB.from('nx_contacts').delete().or(`user_id.eq.${userId},contact_id.eq.${userId}`);
    // Remove this user from all room memberships
    const {data:memberships} = await _SB.from('nx_room_members').select('room_id').eq('user_id', userId);
    if(memberships?.length){
      const roomIds = memberships.map(m=>m.room_id);
      // For direct rooms: delete the whole room + its messages
      for(const rid of roomIds){
        const {data:rm} = await _SB.from('nx_rooms').select('type').eq('id',rid).maybeSingle();
        if(rm?.type==='direct'){
          await _SB.from('nx_messages').delete().eq('room_id',rid);
          await _SB.from('nx_room_members').delete().eq('room_id',rid);
          await _SB.from('nx_rooms').delete().eq('id',rid);
        } else {
          // Group: just remove this user from the member list
          await _SB.from('nx_room_members').delete().eq('room_id',rid).eq('user_id',userId);
        }
      }
    }
    // Finally delete the user row — cascade handles anything left
    await _SB.from('nx_users').delete().eq('id', userId);
  } catch(e){ console.warn('Supabase deleteAccount error:', e); }

  // ── 2. Wipe ALL nx_ localStorage keys for this account ──
  try {
    const toRemove = [];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k && k.startsWith('nx_') && k!=='nx_theme') toRemove.push(k);
    }
    toRemove.forEach(k=>localStorage.removeItem(k));
  } catch(e){}

  // ── 3. Reset all in-memory state ──
  STATE.me=null; STATE.users={}; STATE.rooms={}; STATE.messages={};
  STATE.activeRoom=null; STATE.contacts=new Set(); STATE.addedMe=new Set();
  STATE.showProfile=false; STATE.replyTo=null;
  document.getElementById('profile-panel')?.remove();
  document.getElementById('call-ui')?.remove();
  document.getElementById('incoming-call-ui')?.remove();

  // ── 4. Return to auth screen ──
  document.getElementById('del-acc-overlay')?.remove();
  document.getElementById('settings-overlay')?.remove();
  document.getElementById('mpp-overlay')?.remove();
  document.getElementById('app').classList.remove('visible');
  const a=document.getElementById('auth');
  a.style.display='flex';
  setTimeout(()=>{ a.style.opacity='1'; a.style.pointerEvents='auto'; }, 50);
  document.getElementById('pass-login').value='';
  document.getElementById('phone-login').value='';
  switchAuthTab('register');
  renderRegisteredAccounts();
  toast('🗑️','Account deleted','Your account has been permanently removed');
}

// ══════════════════════════════════════════════════════════════════════════════
// WEBRTC CALLS — peer-to-peer voice/video via Supabase signalling
// ══════════════════════════════════════════════════════════════════════════════
const ICE_SERVERS = { iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}] };
let _callState = null; // { callId, pc, localStream, remoteStream, type, role, peerId, pollTimer }

function _callUid(){ return 'call_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }

async function startCall(type){
  if(!STATE.hasPaid){ showPaywall(); return; }
  const room = STATE.activeRoom; if(!room) return;
  const other = getRoomOtherUser(room); if(!other) return toast('ℹ️','Group calls','Group calls coming soon!');
  if(_callState) return toast('ℹ️','Already in a call','End your current call first');

  // Request media
  let localStream;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video: type==='video' });
  } catch(e) {
    return toast('🎤','Permission denied','Allow microphone'+(type==='video'?' and camera':'')+' access to call');
  }

  const callId = _callUid();
  const pc = new RTCPeerConnection(ICE_SERVERS);
  localStream.getTracks().forEach(t=>pc.addTrack(t, localStream));

  _callState = { callId, pc, localStream, remoteStream:null, type, role:'caller', peerId:other.id, pollTimer:null };
  _showCallUI(type, other, 'calling');

  const iceCandidates = [];
  pc.onicecandidate = e=>{ if(e.candidate) iceCandidates.push(e.candidate.toJSON()); };
  pc.ontrack = e=>{ if(_callState) { _callState.remoteStream = e.streams[0]; _attachRemoteStream(e.streams[0]); } };
  pc.onconnectionstatechange = ()=>{ if(pc.connectionState==='failed'||pc.connectionState==='disconnected') _endCallCleanup('Connection lost'); };

  // Create offer
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  // Wait for ICE gathering to complete or 2s timeout
  await new Promise(resolve=>{
    if(pc.iceGatheringState==='complete') return resolve();
    const t=setTimeout(resolve,2000);
    pc.onicegatheringstatechange=()=>{ if(pc.iceGatheringState==='complete'){ clearTimeout(t); resolve(); } };
  });

  // Write to Supabase — use the callee's actual user ID (not 'me')
  const calleeId = other.id === 'me' ? STATE.me.id : other.id;
  try {
    await _SB.from('nx_calls').insert({
      id: callId, room_id: room.id,
      caller_id: STATE.me.id, callee_id: calleeId,
      type, status:'ringing',
      offer: pc.localDescription.toJSON(),
      ice_caller: iceCandidates
    });
  } catch(e) {
    _endCallCleanup(null);
    return toast('❌','Call failed','Could not reach server. Check your connection.');
  }

  // Poll for answer
  _callState.pollTimer = setInterval(()=>_pollCallAnswer(), 1500);
  // Auto-cancel after 45s if no answer
  setTimeout(()=>{ if(_callState?.callId===callId&&_callState.role==='caller') _endCallCleanup('No answer'); }, 45000);
}

async function _pollCallAnswer(){
  if(!_callState||_callState.role!=='caller') return;
  let data;
  try {
    const res = await _SB.from('nx_calls').select('*').eq('id',_callState.callId).maybeSingle();
    data = res.data;
  } catch(e){ return; }
  if(!data) return;
  if(data.status==='declined'){ _endCallCleanup('Declined ❌'); return; }
  if(data.status==='ended'){ _endCallCleanup('Call ended'); return; }
  if(data.answer && _callState.pc.signalingState==='have-local-offer'){
    try {
      await _callState.pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      (data.ice_callee||[]).forEach(c=>{ try{ _callState.pc.addIceCandidate(new RTCIceCandidate(c)); }catch(e){} });
    } catch(e){ console.warn('setRemoteDescription failed:', e); }
    clearInterval(_callState.pollTimer);
    _callState.pollTimer = setInterval(()=>_pollCallStatus(), 2000);
    _updateCallUI('active');
    _startCallTimer();
  }
}

async function _pollCallStatus(){
  if(!_callState) return;
  const {data} = await _SB.from('nx_calls').select('status').eq('id',_callState.callId).maybeSingle();
  if(!data||data.status==='ended') _endCallCleanup('Call ended');
}

// Called on the receiving end — check for incoming calls
// Map of callId -> full callData row, so onclick only passes the ID string (no JSON-in-HTML)
const _pendingCallsMap = {};

async function _pollIncomingCalls(){
  if(!STATE.me||_callState) return;
  const {data} = await _SB.from('nx_calls')
    .select('*').eq('callee_id',STATE.me.id).eq('status','ringing')
    .order('started_at',{ascending:false}).limit(1).maybeSingle();
  if(!data) return;
  if(Date.now() - new Date(data.started_at).getTime() > 30000){
    await _SB.from('nx_calls').update({status:'missed'}).eq('id',data.id);
    return;
  }
  if(document.getElementById('incoming-call-ui')) return; // already showing
  // Ensure caller is in STATE.users
  if(!STATE.users[data.caller_id]){
    try {
      const {data:u} = await _SB.from('nx_users').select('id,username,handle,status,avatar,is_online').eq('id',data.caller_id).maybeSingle();
      if(u) STATE.users[u.id]={...u,isOnline:u.is_online};
    } catch(e){}
  }
  _pendingCallsMap[data.id] = data;
  _showIncomingCallUI(data.id);
}

async function answerCall(callId){
  document.getElementById('incoming-call-ui')?.remove();
  if(_callState) return;
  // Re-fetch fresh call data from Supabase (offer/ICE may have been updated)
  let callData = _pendingCallsMap[callId];
  try {
    const {data} = await _SB.from('nx_calls').select('*').eq('id',callId).maybeSingle();
    if(data) callData = data;
  } catch(e){}
  if(!callData){ return toast('❌','Call error','Could not load call data'); }
  delete _pendingCallsMap[callId];

  let localStream;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video: callData.type==='video' });
  } catch(e) {
    await _SB.from('nx_calls').update({status:'declined'}).eq('id',callId);
    return toast('🎤','Permission denied','Allow microphone'+(callData.type==='video'?' and camera':'')+' access');
  }

  const pc = new RTCPeerConnection(ICE_SERVERS);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  _callState = { callId, pc, localStream, remoteStream:null, type:callData.type, role:'callee', peerId:callData.caller_id, pollTimer:null };

  const caller = getUser(callData.caller_id);
  _showCallUI(callData.type, caller, 'active');

  const iceCandidates = [];
  pc.onicecandidate = e=>{ if(e.candidate) iceCandidates.push(e.candidate.toJSON()); };
  pc.ontrack = e=>{ _callState.remoteStream=e.streams[0]; _attachRemoteStream(e.streams[0]); };
  pc.onconnectionstatechange = ()=>{ if(pc.connectionState==='failed'||pc.connectionState==='disconnected') _endCallCleanup('Connection lost'); };

  // Offer from Supabase jsonb comes as a plain object with {type,sdp}
  await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
  (callData.ice_caller||[]).forEach(c=>{ try{ pc.addIceCandidate(new RTCIceCandidate(c)); }catch(e){} });

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  // Wait for ICE gathering to complete or timeout after 1.5s
  await new Promise(resolve=>{
    if(pc.iceGatheringState==='complete') return resolve();
    const t=setTimeout(resolve,1500);
    pc.onicegatheringstatechange=()=>{ if(pc.iceGatheringState==='complete'){ clearTimeout(t); resolve(); } };
  });

  await _SB.from('nx_calls').update({
    answer: pc.localDescription.toJSON(),
    ice_callee: iceCandidates,
    status: 'active'
  }).eq('id', callId);

  _callState.pollTimer = setInterval(()=>_pollCallStatus(), 2000);
}

async function declineCall(callId){

async function hangUp(){

}

function _endCallCleanup(reason){
  if(!_callState) return;
  clearInterval(_callState.pollTimer);
  clearInterval(_callTimerInterval);
  _callState.localStream?.getTracks().forEach(t=>t.stop());
  try{ _callState.pc.close(); }catch(e){}
  _callState = null;
  document.getElementById('call-ui')?.remove();
  document.getElementById('incoming-call-ui')?.remove();
  document.getElementById('remote-audio')?.remove();
  if(reason) toast('📵', reason, '');
}

// ── SUPABASE ROOM/MESSAGE SYNC ──
// Stable room ID = sorted user IDs joined with underscore
function _directRoomKey(uid1, uid2){ return 'dr_'+[uid1,uid2].sort().join('_'); }

// Ensure a room exists in Supabase, return its stable ID
async function _ensureRoom(room){
  if(!room||!STATE.me) return null;
  const stableId = room.type==='direct'
    ? _directRoomKey(STATE.me.id, room.members.find(m=>m.id!=='me')?.id||'unknown')
    : room.id;
  // Update local room ID to stable ID if needed
  if(room.id !== stableId){
    if(STATE.rooms[room.id]){
      STATE.rooms[stableId] = {...STATE.rooms[room.id], id:stableId};
      STATE.messages[stableId] = STATE.messages[room.id]||[];
      delete STATE.rooms[room.id]; delete STATE.messages[room.id];
    }
    if(STATE.activeRoom?.id===room.id) STATE.activeRoom=STATE.rooms[stableId];
  }
  try {
    const {data} = await _SB.from('nx_rooms').select('id').eq('id',stableId).maybeSingle();
    if(!data){
      await _SB.from('nx_rooms').insert({id:stableId,type:room.type,name:room.name||null,created_by:STATE.me.id});
      const members = room.type==='direct'
        ? [STATE.me.id, room.members.find(m=>m.id!=='me')?.id].filter(Boolean)
        : room.members.map(m=>m.id==='me'?STATE.me.id:m.id).filter(Boolean);
      if(members.length) await _SB.from('nx_room_members').upsert(members.map(uid=>({room_id:stableId,user_id:uid})));
    }
  } catch(e){ console.warn('_ensureRoom error:',e); }
  return stableId;
}

// Load messages from Supabase for a room
async function _loadRoomMessages(roomId){
  try {
    const {data,error} = await _SB.from('nx_messages')
      .select('id,room_id,sender_id,type,content,reply_to_id,is_deleted,is_edited,created_at')
      .eq('room_id',roomId)
      .order('created_at',{ascending:true})
      .limit(200);
    if(error||!data) return;
    if(!STATE.messages[roomId]) STATE.messages[roomId]=[];
    data.forEach(row=>{
      if(STATE.messages[roomId].find(m=>m.id===row.id)) return; // already have it
      const msg={
        id:row.id, roomId:row.room_id, senderId:row.sender_id==='me'?'me':(row.sender_id===STATE.me?.id?'me':row.sender_id),
        type:row.type||'text', content:row.content, createdAt:new Date(row.created_at),
        readBy:[], deliveredTo:[], reactions:[], replyTo:row.reply_to_id?{id:row.reply_to_id}:null,
        isDeleted:row.is_deleted||false, isEdited:row.is_edited||false, editHistory:[]
      };
      STATE.messages[roomId].push(msg);
      if(STATE.rooms[roomId]) STATE.rooms[roomId].lastMessage={content:msg.type==='text'?msg.content:`📎 ${msg.type}`,timestamp:msg.createdAt,type:msg.type,senderId:msg.senderId};
    });
    _saveState();
  } catch(e){ console.warn('_loadRoomMessages error:',e); }
}

// Poll all rooms for new messages every 3 seconds
let _pollTimer=null;
let _lastPollAt={};
async function _pollMessages(){
  if(!STATE.me) return;
  const roomIds = Object.keys(STATE.rooms);
  for(const roomId of roomIds){
    const since = _lastPollAt[roomId] || new Date(Date.now()-24*3600*1000).toISOString();
    try {
      const {data} = await _SB.from('nx_messages')
        .select('id,room_id,sender_id,type,content,reply_to_id,is_deleted,created_at')
        .eq('room_id',roomId)
        .gt('created_at',since)
        .order('created_at',{ascending:true});
      if(data&&data.length){
        data.forEach(row=>{
          const senderId = row.sender_id===STATE.me.id ? 'me' : row.sender_id;
          const msg={id:row.id,roomId:row.room_id,senderId,type:row.type||'text',content:row.content,
            createdAt:new Date(row.created_at),readBy:[],deliveredTo:[],reactions:[],
            replyTo:row.reply_to_id?{id:row.reply_to_id}:null,isDeleted:row.is_deleted||false,isEdited:false,editHistory:[]};
          addMessageLocal(msg);
        });
        _lastPollAt[roomId] = data[data.length-1].created_at;
      }
    } catch(e){}
  }
}

// Also discover rooms this user is a member of (so messages from other device show up as rooms)
async function _syncRooms(){
  if(!STATE.me) return;
  try {
    // Find all rooms user is a member of
    const {data:memberships} = await _SB.from('nx_room_members').select('room_id').eq('user_id',STATE.me.id);
    if(!memberships||!memberships.length) return;
    for(const {room_id} of memberships){
      if(STATE.rooms[room_id]) continue; // already have it
      const {data:room} = await _SB.from('nx_rooms').select('*').eq('id',room_id).maybeSingle();
      if(!room) continue;
      const {data:members} = await _SB.from('nx_room_members').select('user_id').eq('room_id',room_id);
      const memberList = (members||[]).map(m=>({id:m.user_id===STATE.me.id?'me':m.user_id}));
      STATE.rooms[room_id] = mkRoom(room_id, room.type, memberList);
      if(room.name) STATE.rooms[room_id].name = room.name;
      STATE.messages[room_id] = [];
      // Fetch other user's profile if not cached
      for(const m of memberList){
        if(m.id!=='me'&&!STATE.users[m.id]){
          const {data:u} = await _SB.from('nx_users').select('id,username,handle,status,avatar,is_online').eq('id',m.id).maybeSingle();
          if(u) STATE.users[m.id]={...u,isOnline:u.is_online};
        }
      }
      await _loadRoomMessages(room_id);
      renderSidebar();
    }
  } catch(e){ console.warn('_syncRooms error:',e); }
}

function _stopPolling(){
  if(_pollTimer){ clearInterval(_pollTimer); _pollTimer=null; }
  if(typeof _callTimerInterval!=='undefined'){ clearInterval(_callTimerInterval); }
}

function startSimulator(){
  // Poll every 3 seconds for new messages
  _pollMessages();
  _syncRooms();
  _pollTimer = setInterval(async()=>{
    await _pollMessages();
    await _syncRooms();
  }, 3000);
}


// ── Swipe-right-to-go-back on mobile ──
(function(){
  let _sx=0,_sy=0;
  document.addEventListener('touchstart',e=>{
    if(window.innerWidth>700)return;
    _sx=e.touches[0].clientX; _sy=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(window.innerWidth>700)return;
    const dx=e.changedTouches[0].clientX-_sx;
    const dy=Math.abs(e.changedTouches[0].clientY-_sy);
    // Swipe right ≥60px, mostly horizontal, from left edge ≤40px
    if(dx>=60 && dy<80 && _sx<=40 && STATE.activeRoom){
      backToSidebar();
    }
  },{passive:true});
})();

// Stripe Payment Link — user ID passed via ?client_reference_id= so webhook can identify the user
const _STRIPE_PAYMENT_LINK = 'https://buy.stripe.com/7sY00ifJ58Z15XA0Qo0ZW00';
const _VERIFY_URL = 'https://ftsopyrwjjpkadbkrotd.supabase.co/functions/v1/verify-payment';

    const {data} = await _SB.from('nx_users').select('has_paid').eq('id',STATE.me.id).maybeSingle();

  } catch(e){}

  document.getElementById('paywall-overlay')?.remove();
  const overlay = document.createElement('div');
  overlay.className = 'paywall-overlay'; overlay.id = 'paywall-overlay';
  overlay.innerHTML = `
    <div class="paywall-card">
      <div class="paywall-icon">💬</div>
      <div class="paywall-title">Unlock NexusChat</div>
      <div class="paywall-sub">A one-time payment gives you full access to messaging and calling — forever.</div>
      <div class="paywall-price">£1<span>.00</span></div>

      <div class="paywall-features">

      <div class="paywall-secure">🔒 Secure payment via Stripe</div>

}

function startCheckout(){
  const btn = document.getElementById('paywall-btn');
  if(btn){ btn.disabled=true; btn.textContent='Opening payment…'; }
  // Stripe Payment Link — pass user ID as client_reference_id
  // success_url gets {CHECKOUT_SESSION_ID} which Stripe fills in automatically
  const base = window.location.href.split('?')[0];
  const successUrl = encodeURIComponent(base + '?paid=1&session_id={CHECKOUT_SESSION_ID}');
  const cancelUrl  = encodeURIComponent(base + '?paid=0');
  const url = `${_STRIPE_PAYMENT_LINK}?client_reference_id=${encodeURIComponent(STATE.me.id)}&success_url=${successUrl}&cancel_url=${cancelUrl}`;
  window.location.href = url;
}

async function _checkPaymentReturn(){
  const params = new URLSearchParams(window.location.search);
  if(!params.has('paid')) return;

  // Clean URL immediately
  history.replaceState(null, '', window.location.pathname);

  if(params.get('paid') !== '1'){
    toast('ℹ️','Payment cancelled','Your payment was not completed.');
    return;
  }

  const sessionId = params.get('session_id');
  if(!sessionId){
    toast('⏳','Verifying payment…','Checking your payment status…');
    return;
  }

  // Call verify-payment Edge Function — it checks Stripe and marks has_paid in DB
  try {
    toast('⏳','Verifying payment…','Just a moment…');
    const res = await fetch(_VERIFY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, user_id: STATE.me.id })
    });
    const data = await res.json();
    if(data.paid){
      STATE.hasPaid = true;
      document.getElementById('paywall-overlay')?.remove();
      toast('🎉','Access unlocked!','Welcome to NexusChat! You can now message and call.');
    } else if(data.error === 'STRIPE_SECRET_KEY not configured'){
      // Key not set yet — show instructions
      toast('⚠️','Almost there!','Add your Stripe secret key in Supabase to complete setup.');
      _showKeySetupModal();
    } else {
      toast('⚠️','Payment not confirmed','Status: '+(data.status||'unknown')+'. Contact support if you were charged.');
    }
  } catch(e){
    toast('❌','Verification failed','Please refresh and try again.');
  }
}

  const overlay = document.createElement('div');

  overlay.innerHTML = `<div class="modal" style="max-width:420px">
